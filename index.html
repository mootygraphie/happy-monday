function _achLevel(val, tiers) {
  let lv=0; for(let i=0;i<tiers.length;i++){if(val>=tiers[i])lv=i+1;else break;} return lv;
}

function computeAchievementStats(playerName) {
  const _ss = [...SESSIONS].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let buts=0,passes=0,presences=0,absences=0,injuries=0,sessionsBlesses=0,sac=0,maillots=0;
  let hattricks=0,doubleDouble=0,cleanSheets=0,mvp=0,soireeParfaite=0,invincible=0,csc=0,zeroVict=0,toutNul=0;
  let gardiensCleanSheets=0,gardiensButsEncaisses=0,remontadas=0;
  const teamsSet=new Set(), duoMap={};
  let inEp=false, bestStreak=0, curStreak=0, fantomeStreak=0, sessionsAvecGA=0;
  const yearMap={};

  _ss.forEach(s => {
    const info=s.presences[playerName]; if(!info){inEp=false;return;}
    const yr=new Date(s.date).getFullYear();
    if(!yearMap[yr]) yearMap[yr]={present:0,total:0};
    if(info.statut==="Présent"||info.statut==="Absent") yearMap[yr].total++;

    if(info.statut==="Présent") {
      presences++; yearMap[yr].present++; inEp=false;
      if(s.sac===playerName) sac++;
      if(s.maillots===playerName) maillots++;
      const myEq=info.equipe; if(myEq) teamsSet.add(myEq);

      let sessGA=0,sessPlayed=0,sessWithGA=0,sessInvic=true,sessWins=0;
      const allGA={};

      (s.matchs||[]).forEach(m => {
        const inMatch=myEq&&(m.eqA===myEq||m.eqB===myEq);
        let g=0,a=0;
        ["A","B"].forEach(side=>{
          (m[`buteurs${side}`]||[]).forEach((b,i)=>{
            const p=(m[`passeurs${side}`]||[])[i];
            if(b==="CSC"){if(p===playerName)csc++;return;}
            if(!b)return;
            if(!allGA[b])allGA[b]=0; allGA[b]++;
            if(p&&p!=="CSC"){if(!allGA[p])allGA[p]=0; allGA[p]++;}
            if(b===playerName)g++;
            if(p&&p!=="CSC"&&p===playerName)a++;
            if(p&&p!=="CSC"){
              if(b===playerName)duoMap[p]=(duoMap[p]||0)+1;
              else if(p===playerName)duoMap[b]=(duoMap[b]||0)+1;
            }
          });
        });
        buts+=g; passes+=a; sessGA+=g+a;
        // Gardien stats : hors inMatch car le banquier peut être gardien des deux côtés
        if(m.mt1A!==undefined && m.mt1B!==undefined){
          const gA=m.gardiensA||[], gB=m.gardiensB||[];
          const mt1Ac=m.mt1B||0, mt2Ac=Math.max(0,(m.scoreB||0)-(m.mt1B||0));
          const mt1Bc=m.mt1A||0, mt2Bc=Math.max(0,(m.scoreA||0)-(m.mt1A||0));
          if(gA[0]&&gA[0]===playerName){gardiensButsEncaisses+=mt1Ac;if(mt1Ac===0)gardiensCleanSheets++;}
          if(gA[1]&&gA[1]===playerName){gardiensButsEncaisses+=mt2Ac;if(mt2Ac===0)gardiensCleanSheets++;}
          if(gB[0]&&gB[0]===playerName){gardiensButsEncaisses+=mt1Bc;if(mt1Bc===0)gardiensCleanSheets++;}
          if(gB[1]&&gB[1]===playerName){gardiensButsEncaisses+=mt2Bc;if(mt2Bc===0)gardiensCleanSheets++;}
        }
        if(inMatch){
          sessPlayed++;
          if(g+a>0){sessWithGA++;curStreak++;if(curStreak>bestStreak)bestStreak=curStreak;}
          else curStreak=0;
          const conceded=m.eqA===myEq?m.scoreB:m.scoreA; if(conceded===0)cleanSheets++;
          // Remontadas : équipe du joueur menait pas à la mi-temps mais gagne
          if(m.mt1A!==undefined && m.mt1B!==undefined){
            const isA=m.eqA===myEq;
            const mt1gf=isA?m.mt1A:m.mt1B, mt1ga=isA?m.mt1B:m.mt1A;
            const fgf=isA?m.scoreA:m.scoreB, fga=isA?m.scoreB:m.scoreA;
            if(mt1gf<mt1ga&&fgf>fga)remontadas++;
          }
          const w=m.scoreA>m.scoreB?m.eqA:m.scoreB>m.scoreA?m.eqB:null;
          if(w&&w!==myEq)sessInvic=false;
          if(w&&w===myEq)sessWins++;
          if(g>=3)hattricks++;
          if(g>=1&&a>=1)doubleDouble++;
        }
      });

      if(sessPlayed>0&&sessPlayed===sessWithGA)soireeParfaite++;
      if(myEq&&sessInvic)invincible++;
      if(sessPlayed>0&&sessWins===0)zeroVict++;
      const teamMatchs=(s.matchs||[]).filter(m=>myEq&&(m.eqA===myEq||m.eqB===myEq));
      const allDraw=teamMatchs.length>0&&teamMatchs.every(m=>m.scoreA===m.scoreB);
      if(allDraw)toutNul++;
      const pGA=allGA[playerName]||0;
      if(pGA>0&&!Object.values(allGA).some(v=>v>pGA))mvp++;
      if(sessGA===0) fantomeStreak++;
      if(sessGA>0) sessionsAvecGA++;

    } else if(info.statut==="Absent"){
      absences++; inEp=false;
    } else if(info.statut==="Blessé"){
      sessionsBlesses++;
      if(!inEp){injuries++;inEp=true;}
    } else { inEp=false; }
  });

  const bestDuo=Math.max(0,...Object.values(duoMap));
  const grandChelem=(teamsSet.has("Rouge")&&teamsSet.has("Vert")&&teamsSet.has("Bleue"))?1:0;
  const assiduAnnes=(()=>{
    const ys=Object.values(yearMap).filter(y=>y.total>=10);
    if(ys.some(y=>y.present/y.total>=0.9))return 4;
    if(ys.some(y=>y.present/y.total>=0.8))return 3;
    if(ys.some(y=>y.present/y.total>=0.7))return 2;
    if(ys.some(y=>y.present/y.total>=0.6))return 1;
    return 0;
  })();
  const cometeAnnes=(()=>{
    const ys=Object.values(yearMap).filter(y=>y.total>=10);
    if(ys.some(y=>y.present/y.total<=0.10))return 4;
    if(ys.some(y=>y.present/y.total<=0.20))return 3;
    if(ys.some(y=>y.present/y.total<=0.30))return 2;
    if(ys.some(y=>y.present/y.total<=0.40))return 1;
    return 0;
  })();

  return { buts, passes, gaTotal:buts+passes, presences, absences, injuries, sessionsBlesses,
           sac, maillots, hattricks, bestStreak, soireeParfaite, doubleDouble,
           invincible, cleanSheets, bestDuo, mvp, csc, grandChelem,
           fantomeStreak, assiduAnnes, cometeAnnes, zeroVict, toutNul, sessionsAvecGA,
           gardiensCleanSheets, gardiensButsEncaisses, remontadas };
}

function renderAchievementsGrid(achSt) {
  let legendeCount=0;
  ACH_DEFS.filter(a=>a.id!=='legende').forEach(a=>{ legendeCount+=_achLevel(achSt[a.key]||0,a.tiers); });
  achSt.legendeCount=legendeCount;

  let html=`<div class="ach-grid">`;
  ACH_DEFS.forEach(ach=>{
    const val=achSt[ach.key]||0;
    const rawLv=_achLevel(val,ach.tiers);
    const locked=rawLv===0;
    if(ach.hidden&&locked)return;
    const lv=locked?0:ach.fixedTier?ach.fixedTier:Math.min(6,rawLv+(ach.tierOffset||0));
    const maxT=ach.tiers.length;

    const iconHtml=locked
      ?`<span class="ach-icon" style="font-weight:600;color:var(--text3)">?</span>`
      :`<span class="ach-icon">${ach.icon}</span>`;
    const nameHtml=locked?`<span class="ach-label" style="opacity:.18">???</span>`
      :`<span class="ach-label">${ach.name}</span>`;

    const dots=(maxT>1)?`<div class="ach-dots"${locked?' style="opacity:0"':''}>${Array.from({length:maxT},(_,i)=>`<div class="ach-dot${i<rawLv?' on':''}"></div>`).join('')}</div>`:'';

    let tip='';
    if(locked){ tip='Haut fait inconnu'; }
    else {
      const tn=(ach.tierNames?ach.tierNames[rawLv-1]:null)||ACH_TIER_NAMES[lv]||`Niveau ${lv}`;
      tip=`${ach.name} — ${tn}\n${ach.desc(val)}${!ach.fixedTier&&rawLv<maxT?`\nProchain seuil : ${ach.tiers[rawLv]}`:''}`;
    }

    html+=`<div class="ach-cell t${lv}${ach.id==='comete'?' ach-comete':''}${ach.id==='bonnet'?' ach-bonnet':''}${ach.id==='passoire'?' ach-passoire':''}" data-tip="${tip.replace(/"/g,'&quot;')}">${iconHtml}${nameHtml}${dots}</div>`;
  });
  html+=`</div>`;
  return html;
}

function renderAchievementsLegend() {
  let h = `<div class="section-label" style="margin-top:2rem">Référence des hauts faits — admin</div>`;
  h += `<div style="display:flex;flex-direction:column;gap:18px;margin-bottom:2rem">`;
  ACH_DEFS.forEach(ach => {
    h += `<div>
      <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.07em">
        <span style="font-size:16px">${ach.icon}</span>${ach.name}${ach.hidden?`<span style="font-size:10px;color:var(--text3);font-weight:500;text-transform:none;letter-spacing:0;font-style:italic">(masqué)</span>`:''}
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:6px">`;
    if (ach.fixedTier) {
      const tierName = ACH_TIER_NAMES[ach.fixedTier] || `Niv.${ach.fixedTier}`;
      h += `<div class="ach-cell t${ach.fixedTier}" style="height:auto;min-height:90px;padding:10px 6px;cursor:default">
        <span class="ach-icon">${ach.icon}</span>
        <span class="ach-label" style="opacity:1;color:currentColor">${tierName}</span>
        <span style="font-size:9px;color:var(--text3);text-align:center;line-height:1.35;display:block;padding:0 2px">${ach.desc(ach.tiers[0])}</span>
      </div>`;
    } else {
      ach.tiers.forEach((threshold, i) => {
        const rawNum = i + 1;
        const displayNum = Math.min(6, rawNum + (ach.tierOffset||0));
        const tierName = (ach.tierNames?ach.tierNames[i]:null) || ACH_TIER_NAMES[displayNum] || `Niv.${displayNum}`;
        h += `<div class="ach-cell t${displayNum}${ach.id==='comete'?' ach-comete':''}${ach.id==='bonnet'?' ach-bonnet':''}${ach.id==='passoire'?' ach-passoire':''}" style="height:auto;min-height:90px;padding:10px 6px;cursor:default">
          <span class="ach-icon">${ach.icon}</span>
          <span class="ach-label" style="opacity:1;color:currentColor">${tierName}</span>
          <span style="font-size:9px;color:var(--text3);text-align:center;line-height:1.35;display:block;padding:0 2px">${ach.desc(threshold)}</span>
        </div>`;
      });
    }
    h += `</div></div>`;
  });
  h += `</div>`;
  return h;
}

function openPlayerPanel(playerName) {
  const st = computePlayerDetailStats(playerName);
  const isJoker = JOKERS.has(playerName);
  const medals  = ["🥇","🥈","🥉"];
  const nd = `<p class="no-data" style="margin-top:4px">—</p>`;
  const _achSt = computeAchievementStats(playerName);
  let h = "";

  /* Forme récente (5 dernières sessions où le joueur était Présent) */
  {
    const _sortedSess = [...SESSIONS].sort((a,b) => new Date(b.date)-new Date(a.date));
    const _recent = _sortedSess.filter(s => {
      const info = s.presences[playerName];
      return info && info.statut === "Présent";
    }).slice(0, 5);

    h += `<div><div class="pp-section-title">Forme récente</div>`;
    if (_recent.length === 0) {
      h += `<p class="no-data" style="margin-top:4px">—</p>`;
    } else {
      h += `<div style="display:flex;flex-direction:column;gap:5px">`;
      _recent.forEach(s => {
        const info = s.presences[playerName];
        const myEq = info.equipe || null;
        const dateStr = new Date(s.date).toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
        // G/A de la session
        let gSess=0, aSess=0;
        (s.matchs||[]).forEach(m => {
          ["A","B"].forEach(side => {
            const buts   = m[`buteurs${side}`]  || [];
            const passes = m[`passeurs${side}`] || [];
            buts.forEach((b,i) => {
              if (!b || b==="CSC") return;
              if (b === playerName) gSess++;
              const p = passes[i];
              if (p && p!=="CSC" && p === playerName) aSess++;
            });
          });
        });
        // Résultat : W/D/L
        let wins=0, losses=0, draws=0;
        if (myEq) {
          (s.matchs||[]).filter(m => m.eqA===myEq||m.eqB===myEq).forEach(m => {
            const w = m.scoreA>m.scoreB?m.eqA:m.scoreB>m.scoreA?m.eqB:null;
            if (w===myEq) wins++; else if (w===null) draws++; else losses++;
          });
        }
        let resultStr, resultColor;
        if (!myEq || (wins===0 && losses===0 && draws===0)) {
          resultStr = '='; resultColor = 'var(--text3)';
        } else if (wins > losses) {
          resultStr = '✓'; resultColor = '#34A853';
        } else if (losses > wins) {
          resultStr = '✗'; resultColor = '#ea4335';
        } else {
          resultStr = '='; resultColor = 'var(--text3)';
        }
        const gaStr = gSess+aSess > 0 ? `${gSess}G ${aSess}A` : `0 G/A`;
        const badgeHtml = myEq ? badge(myEq) : '';
        h += `<div class="forme-row">
          <span class="forme-date">${dateStr}</span>
          ${badgeHtml}
          <span class="forme-ga">${gaStr}</span>
          <span class="forme-result" style="color:${resultColor}">${resultStr}</span>
        </div>`;
      });
      h += `</div>`;
    }
    h += `</div>`;
  }

  /* Statistiques */
  h += `<div>
    <div class="pp-section-title">Statistiques</div>
    <div class="pp-stats-grid">
      <div class="pp-stat-card">
        <div class="pp-stat-val green">${st.presences}</div>
        <div class="pp-stat-lbl">Présences</div>
      </div>
      <div class="pp-stat-card">
        <div class="pp-stat-val muted">${st.matchsJoues}</div>
        <div class="pp-stat-lbl">Matchs</div>
      </div>
      <div class="pp-stat-card">
        <div class="pp-stat-val ${st.buts>0?"blue":"muted"}">${st.buts}</div>
        <div class="pp-stat-lbl">Buts</div>
        ${st.matchsJoues>0?`<div class="pp-stat-sub">moy. ${(st.buts/st.matchsJoues).toFixed(2).replace(".",",")} / m</div>`:""}
      </div>
      <div class="pp-stat-card">
        <div class="pp-stat-val ${st.passesDecisives>0?"blue":"muted"}">${st.passesDecisives}</div>
        <div class="pp-stat-lbl">Assists</div>
        ${st.matchsJoues>0?`<div class="pp-stat-sub">moy. ${(st.passesDecisives/st.matchsJoues).toFixed(2).replace(".",",")} / m</div>`:""}
      </div>
      <div class="pp-stat-card">
        <div class="pp-stat-val ${st.victoires>0?"green":"muted"}">${st.victoires}</div>
        <div class="pp-stat-lbl">Victoires</div>
      </div>
      <div class="pp-stat-card">
        <div class="pp-stat-val ${st.defaites>0?"red":"muted"}">${st.defaites}</div>
        <div class="pp-stat-lbl">Défaites</div>
      </div>
      <div class="pp-stat-card">
        <div class="pp-stat-val ${st.absences>0?"red":"muted"}">${st.absences}</div>
        <div class="pp-stat-lbl">Absences</div>
      </div>
      <div class="pp-stat-card">
        <div class="pp-stat-val muted">${st.pasRepondu}</div>
        <div class="pp-stat-lbl">Pas répondu</div>
      </div>
      <div class="pp-stat-card" style="grid-column: 1 / -1; gap: 8px;">
        <div class="pp-stat-val ${st.episodesBlessures>0?"amber":"muted"}">${st.episodesBlessures}</div>
        <div class="pp-stat-lbl">Blessure${st.episodesBlessures>1?"s":""}</div>
        <div style="margin:0 4px;color:var(--border2);font-size:16px;font-weight:300;flex-shrink:0">/</div>
        <div class="pp-stat-val ${st.blesses>0?"amber":"muted"}">${st.blesses}</div>
        <div class="pp-stat-lbl">Session${st.blesses>1?"s":""} manquée${st.blesses>1?"s":""}</div>
        <div style="flex:1"></div>
        <div class="pp-stat-lbl" style="opacity:.45;font-size:10px">Blessures</div>
      </div>
      <div class="pp-stat-card">
        <div class="pp-stat-val ${st.sac>0?"amber":"muted"}">${st.sac}</div>
        <div class="pp-stat-lbl">Sac 🎒</div>
      </div>
      <div class="pp-stat-card">
        <div class="pp-stat-val ${st.maillots>0?"amber":"muted"}">${st.maillots}</div>
        <div class="pp-stat-lbl">Maillots 👕</div>
      </div>
      <div class="pp-stat-card">
        <div class="pp-stat-val ${_achSt.gardiensCleanSheets>0?"green":"muted"}">${_achSt.gardiensCleanSheets}</div>
        <div class="pp-stat-lbl">Clean sheets 🧱</div>
      </div>
      <div class="pp-stat-card">
        <div class="pp-stat-val ${_achSt.gardiensButsEncaisses>0?"red":"muted"}">${_achSt.gardiensButsEncaisses}</div>
        <div class="pp-stat-lbl">Buts encaissés 🪣</div>
      </div>
      <div class="pp-stat-card">
        <div class="pp-stat-val ${_achSt.remontadas>0?"blue":"muted"}">${_achSt.remontadas}</div>
        <div class="pp-stat-lbl">Remontadas 🌅</div>
      </div>
    </div>
  </div>`;

  /* Radar de profil */
  {
    // Axes (sens horaire depuis le haut) : Buteur · Défenseur · Blessures · Intendant · Présence · Passeur
    const _radarAxes = [
      { label: 'Buteur',    val: _achSt.buts },
      { label: 'Défenseur', val: _achSt.cleanSheets },
      { label: 'Blessures', val: _achSt.sessionsBlesses },
      { label: 'Intendant', val: _achSt.sac + _achSt.maillots },
      { label: 'Présence',  val: _achSt.presences },
      { label: 'Passeur',   val: _achSt.passes },
    ];
    // Normalisation 0-100 relative au max de tous les joueurs
    const _radarMaxes = _radarAxes.map((ax, i) => {
      return Math.max(1, ...ALL_PLAYERS.map(p => {
        const s = computeAchievementStats(p);
        const vals = [s.buts, s.cleanSheets, s.sessionsBlesses, s.sac+s.maillots, s.presences, s.passes];
        return vals[i];
      }));
    });
    const _scores = _radarAxes.map((ax, i) => Math.round((ax.val / _radarMaxes[i]) * 100));

    // SVG radar
    const cx=110, cy=110, R=80, N=6;
    const pts = (r) => Array.from({length:N}, (_,i) => {
      const ang = (Math.PI*2*i/N) - Math.PI/2;
      return [cx + r*Math.cos(ang), cy + r*Math.sin(ang)];
    });
    const ptsStr = (arr) => arr.map(p=>p.join(',')).join(' ');
    // Grille
    let svgG = '';
    [25,50,75,100].forEach(pct => {
      const r = R*pct/100;
      svgG += `<polygon points="${ptsStr(pts(r))}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`;
    });
    // Axes
    const outerPts = pts(R);
    outerPts.forEach(([x,y]) => {
      svgG += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`;
    });
    // Polygon de données
    const dataPts = Array.from({length:N}, (_,i) => {
      const ang = (Math.PI*2*i/N) - Math.PI/2;
      const r = R * _scores[i] / 100;
      return [cx + r*Math.cos(ang), cy + r*Math.sin(ang)];
    });
    svgG += `<polygon points="${ptsStr(dataPts)}" fill="rgba(254,219,0,.18)" stroke="#FEDB00" stroke-width="1.5"/>`;
    // Dots
    dataPts.forEach(([x,y]) => {
      svgG += `<circle cx="${x}" cy="${y}" r="3" fill="#FEDB00"/>`;
    });
    // Labels
    outerPts.forEach(([x,y], i) => {
      const lx = cx + (R+22)*Math.cos((Math.PI*2*i/N)-Math.PI/2);
      const ly = cy + (R+22)*Math.sin((Math.PI*2*i/N)-Math.PI/2);
      const score = _scores[i];
      const anchor = lx < cx-4 ? 'end' : lx > cx+4 ? 'start' : 'middle';
      svgG += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" font-size="8" fill="rgba(200,200,215,0.65)" font-family="inherit" letter-spacing="0.06em">${_radarAxes[i].label.toUpperCase()}</text>`;
    });

    h += `<div>
      <div class="pp-section-title">Profil</div>
      <div class="radar-wrap">
        <svg viewBox="0 0 220 220" width="220" height="220" style="overflow:visible">${svgG}</svg>
      </div>
    </div>`;
  }

  /* Meilleur match */
  if (st.bestMatch && (st.bestMatchGoals > 0 || st.bestMatchAssists > 0)) {
    const bmParts = [];
    if (st.bestMatchGoals > 0) bmParts.push(`${st.bestMatchGoals} but${st.bestMatchGoals>1?"s":""}`);
    if (st.bestMatchAssists > 0) bmParts.push(`${st.bestMatchAssists} assist${st.bestMatchAssists>1?"s":""}`);
    h += `<div>
      <div class="pp-section-title">Meilleur match ⚽️</div>
      <div class="pp-match-card">
        <div style="font-size:13px;color:var(--text2)">${fmtDate(st.bestMatch.date)}</div>
        <div style="font-size:24px;font-weight:700;margin:6px 0;color:var(--gold);font-style:italic">${bmParts.join(" · ")}</div>
        <div class="pp-match-score">
          ${badge(st.bestMatch.eqA)}<span style="font-size:15px;font-weight:700">${st.bestMatch.scoreA}–${st.bestMatch.scoreB}</span>${badge(st.bestMatch.eqB)}
        </div>
      </div>
    </div>`;
  }

  /* Meilleur Link-Up all-time */
  const _luAll = computeLinkUpStats(SESSIONS).filter(d => d.p1 === playerName || d.p2 === playerName);
  h += `<div><div class="pp-section-title">Meilleur Link-Up ⚡</div>`;
  if (_luAll.length) {
    const _luBest = _luAll[0];
    const _luPartner = _luBest.p1 === playerName ? _luBest.p2 : _luBest.p1;
    h += `<div class="pp-match-card">
      <div style="font-size:13px;color:var(--text2)">All-time</div>
      <div style="font-size:22px;font-weight:700;margin:6px 0;font-style:italic">
        <button class="player-link" data-player="${_luPartner}" style="font-size:inherit">${_luPartner}</button>
      </div>
      <div style="display:flex;align-items:baseline;gap:5px">
        <span style="font-size:22px;font-weight:700;color:var(--gold);font-style:italic">${_luBest.connexions}</span>
        <span style="font-size:13px;color:var(--text2)">but${_luBest.connexions>1?"s":""}</span>
      </div>
      ${(()=>{const _ip1=_luBest.p1===playerName;const _mG=_ip1?_luBest.p1Goals:_luBest.p2Goals;const _mA=_ip1?_luBest.p2Goals:_luBest.p1Goals;const _pG=_ip1?_luBest.p2Goals:_luBest.p1Goals;const _pA=_ip1?_luBest.p1Goals:_luBest.p2Goals;return`<div style="display:flex;gap:10px;margin-top:8px;font-size:11px;color:var(--text3);flex-wrap:wrap"><span><strong style="color:var(--text2)">${playerName}</strong> ${_mG}G · ${_mA}A</span><span><strong style="color:var(--text2)">${_luPartner}</strong> ${_pG}G · ${_pA}A</span></div>`;})()}
    </div>`;
  } else { h += nd; }
  h += `</div>`;

  /* Meilleure série */
  h += `<div><div class="pp-section-title">Meilleure série 🔥</div>`;
  {
    const _cur  = st.currentStreak;
    const _best = st.bestHistoricalStreak;
    const _curBetter = (c, b) => c.count > b.count || (c.count === b.count && (c.g+c.a) >= (b.g+b.a));
    if (!_cur && !_best) {
      h += nd;
    } else {
      const primary  = (_cur && (!_best || _curBetter(_cur, _best))) ? _cur : _best;
      const isActive = primary === _cur;
      const ga = primary.g + primary.a;
      const dateStr = isActive
        ? `Depuis le ${fmtDate(primary.start)}`
        : `${fmtDate(primary.start)} — ${fmtDate(primary.end)}`;
      h += `<div class="pp-match-card">
        <div style="font-size:13px;color:var(--text2)">${dateStr}</div>
        <div style="margin:8px 0 4px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
          <span style="font-size:28px;font-weight:700;font-style:italic;color:var(--text1);line-height:1">${ga} G/A</span>
          <span style="font-size:12px;color:var(--text2)">(${primary.g}G + ${primary.a}A)</span>
          <span style="font-size:13px;color:var(--text1)">· ${primary.count} match${primary.count>1?"s":""}</span>
        </div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${isActive?"#34A853":"var(--text3)"}">${isActive?"En cours":"Terminée"}</div>
      </div>`;
      if (!isActive && _cur) {
        const cga = _cur.g + _cur.a;
        h += `<div style="margin-top:8px;padding:8px 14px;background:rgba(52,168,83,.08);border:1px solid rgba(52,168,83,.2);border-radius:var(--radius);display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#34A853">En cours</span>
          <span style="font-size:12px;color:var(--text2)">${cga} G/A (${_cur.g}G + ${_cur.a}A) · ${_cur.count} match${_cur.count>1?"s":""}</span>
        </div>`;
      }
    }
  }
  h += `</div>`;

  /* Couleur récurrente */
  h += `<div><div class="pp-section-title">Couleur récurrente</div>`;
  if (st.recurringColor) {
    const c = st.recurringColor, cls = c.toLowerCase(), n = st.teamCount[c];
    h += `<div style="display:flex;align-items:center;gap:10px">
      <span class="pp-color-pill ${cls}" style="white-space:nowrap">${dot(c)}${TEAM_LABEL[c]||c}</span>
      <span style="font-size:12px;color:var(--text3)">${n} session${n>1?"s":""}</span>
    </div>`;
  } else { h += nd; }
  h += `</div>`;

  /* Top 3 coéquipiers récurrents */
  h += `<div><div class="pp-section-title">Top 3 coéquipiers récurrents</div>`;
  if (st.top3Teammates.length) {
    h += `<div class="pp-teammate-list">`;
    st.top3Teammates.forEach(([name, n], i) => {
      h += `<div class="pp-teammate-row">
        <span class="pp-teammate-rank">${medals[i]}</span>
        <span class="pp-teammate-name">${name}${JOKERS.has(name)?`<span class="joker-tag">+1</span>`:""}</span>
        <span class="pp-teammate-val">${n}</span><span class="pp-teammate-unit">session${n>1?"s":""}</span>
      </div>`;
    });
    h += `</div>`;
  } else { h += nd; }
  h += `</div>`;

  /* Couleur préférée (victoires) */
  h += `<div><div class="pp-section-title">Couleur préférée</div>`;
  if (st.prefWinColor) {
    const c = st.prefWinColor, cls = c.toLowerCase(), n = st.maxWins;
    h += `<div style="display:flex;align-items:center;gap:10px">
      <span class="pp-color-pill ${cls}" style="white-space:nowrap">${dot(c)}${TEAM_LABEL[c]||c}</span>
      <span style="font-size:12px;color:var(--text3)">${n} victoire${n>1?"s":""}</span>
    </div>`;
  } else { h += `<p class="no-data" style="margin-top:4px">Aucune victoire enregistrée</p>`; }
  h += `</div>`;

  /* Top 3 coéquipiers préférés */
  h += `<div><div class="pp-section-title">Top 3 coéquipiers préférés</div>`;
  if (st.top3WinTeammates.length) {
    h += `<div class="pp-teammate-list">`;
    st.top3WinTeammates.forEach(([name, n], i) => {
      h += `<div class="pp-teammate-row">
        <span class="pp-teammate-rank">${medals[i]}</span>
        <span class="pp-teammate-name">${name}${JOKERS.has(name)?`<span class="joker-tag">+1</span>`:""}</span>
        <span class="pp-teammate-val">${n}</span><span class="pp-teammate-unit">victoire${n>1?"s":""}</span>
      </div>`;
    });
    h += `</div>`;
  } else { h += `<p class="no-data" style="margin-top:4px">Aucune victoire enregistrée</p>`; }
  h += `</div>`;

  /* Hauts faits */
  h += `<div><div class="pp-section-title">Hauts faits</div>${renderAchievementsGrid(computeAchievementStats(playerName))}</div>`;

  document.getElementById("pp-name").textContent = playerName + (isJoker ? " +1" : "");
  const ppBody = document.getElementById("pp-body");
  ppBody.innerHTML = h;
  ppBody.style.opacity   = '0';
  ppBody.style.transition = 'none';
  setTimeout(() => { ppBody.style.opacity = ''; animateView(ppBody); }, 290);
  document.getElementById("player-panel-overlay").classList.add("open");
  document.getElementById("player-panel").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closePlayerPanel() {
  document.getElementById("player-panel-overlay").classList.remove("open");
  document.getElementById("player-panel").classList.remove("open");
  document.body.style.overflow = "";
}

/* ─────────────────────────────────────────────────────
   SAISIE — onglet de saisie des sessions
───────────────────────────────────────────────────── */

let _draft = null;
let _draftSavedAt = null;
let _editMode = false;

const _STATUTS_REG  = ["Présent", "Absent", "Blessé", "Pas répondu"];
const _STATUT_CLS   = { "Présent":"active-present", "Absent":"active-absent", "Blessé":"active-blesse", "Pas répondu":"active-nr" };
const _JOKER_NC = "Non convoqué";

function _newDraft() {
  const presences = {};
  ALL_PLAYERS.forEach(p => {
    presences[p] = { statut: JOKERS.has(p) ? _JOKER_NC : "Pas répondu", equipe: "" };
  });
  return { date: "", sac: "", maillots: "", presences, matchs: [], tempJokers: [] };
}

function _loadDraft() {
  try {
    const s = localStorage.getItem("hmft_draft");
    if (s) { _draft = JSON.parse(s); return; }
  } catch(e) {}
  _draft = _newDraft();
}

function _loadSessionIntoDraft(session) {
  const presences = {};
  ALL_PLAYERS.forEach(p => {
    presences[p] = { statut: JOKERS.has(p) ? _JOKER_NC : "Pas répondu", equipe: "" };
  });
  const tempJokers = [];
  Object.entries(session.presences).forEach(([p, info]) => {
    if (!ALL_PLAYERS.includes(p)) {
      tempJokers.push(p);
      presences[p] = { statut: info.statut === "Présent" ? "Présent" : _JOKER_NC, equipe: info.equipe || "", joker: true, temp: true };
    } else if (JOKERS.has(p)) {
      presences[p] = { statut: info.statut === "Présent" ? "Présent" : _JOKER_NC, equipe: info.equipe || "" };
    } else {
      presences[p] = { statut: info.statut, equipe: info.equipe || "" };
    }
  });
  return {
    date: session.date,
    sac: session.sac || "",
    maillots: session.maillots || "",
    presences,
    matchs: (session.matchs || []).map(m => ({
      eqA: m.eqA, eqB: m.eqB,
      scoreA: m.scoreA, scoreB: m.scoreB,
      buteursA:  [...(m.buteursA  || [])],
      buteursB:  [...(m.buteursB  || [])],
      passeursA: [...(m.passeursA || [])],
      passeursB: [...(m.passeursB || [])],
      mt1A: m.mt1A ?? 0, mt1B: m.mt1B ?? 0,
      gardiensA: [...(m.gardiensA || ["",""])],
      gardiensB: [...(m.gardiensB || ["",""])]
    })),
    tempJokers
  };
}

function _saveDraft() {
  localStorage.setItem("hmft_draft", JSON.stringify(_draft));
  _draftSavedAt = new Date().toLocaleTimeString("fr", { hour: "2-digit", minute: "2-digit" });
  const el = document.getElementById("saisie-status");
  if (el) el.innerHTML = `<span style="color:#2ecc71;font-size:12px">✓ Sauvegardé à ${_draftSavedAt}</span>`;
  if (_db) _db.ref('config/draft').set(_draft).catch(e => console.error('FB draft save:', e));
}

function _presentList() {
  return Object.entries(_draft.presences).filter(([,v]) => v.statut === "Présent").map(([k]) => k).sort((a, b) => a.localeCompare(b, "fr"));
}

function _activeTeams() {
  const t = new Set();
  Object.values(_draft.presences).forEach(v => { if (v.statut === "Présent" && v.equipe) t.add(v.equipe); });
  return ["Rouge","Vert","Bleue"].filter(c => t.has(c));
}

function _playersOfTeam(color) {
  return Object.entries(_draft.presences)
    .filter(([,v]) => v.statut === "Présent" && v.equipe === color).map(([k]) => k).sort((a, b) => a.localeCompare(b, "fr"));
}

function _presenceRowHTML(p, statut, isJoker, removable) {
  if (isJoker) {
    return `<div class="saisie-player-row">
      <span class="saisie-player-name">${p}<span class="joker-tag">+1</span></span>
      <div class="saisie-status-btns">
        <button class="saisie-statut-btn ${statut==="Présent"?"active-present":""}" data-player="${p}" data-statut="Présent">✅</button>
        <button class="saisie-statut-btn ${statut===_JOKER_NC?"active-nc":""}" data-player="${p}" data-statut="${_JOKER_NC}" title="Non convoqué">🫥</button>
        ${removable ? `<button class="saisie-remove-temp-joker" data-player="${p}" title="Retirer ce joueur" style="background:transparent;border:none;color:var(--fg3);cursor:pointer;font-size:15px;padding:0 4px;margin-left:4px">✕</button>` : ""}
      </div>
    </div>`;
  }
  return `<div class="saisie-player-row">
    <span class="saisie-player-name">${p}</span>
    <div class="saisie-status-btns">
      ${_STATUTS_REG.map(s => `<button class="saisie-statut-btn ${statut===s?_STATUT_CLS[s]:""}" data-player="${p}" data-statut="${s}">${{"Présent":"✅","Absent":"❌","Blessé":"🤕","Pas répondu":"❓"}[s]}</button>`).join("")}
    </div>
  </div>`;
}

function _buildEquipesHTML() {
  const presents = _presentList();
  if (!presents.length) return `<p class="saisie-empty">Aucun joueur marqué comme Présent.</p>`;
  const TEAM_BTNS = [
    { key: "Rouge", label: "R", cls: "eq-btn-rouge" },
    { key: "Vert",  label: "J", cls: "eq-btn-vert"  },
    { key: "Bleue", label: "B", cls: "eq-btn-bleue"  },
  ];
  return `<div class="saisie-equipes-grid">${presents.map(p => {
    const eq = _draft.presences[p]?.equipe || "";
    const isJoker = JOKERS.has(p) || (_draft.tempJokers||[]).includes(p);
    const btns = TEAM_BTNS.map(t =>
      `<button class="saisie-eq-btn ${t.cls}${eq===t.key?" active":""}" data-player="${p}" data-equipe="${t.key}">${t.label}</button>`
    ).join("");
    return `<div class="saisie-equipe-row">
      <span class="saisie-player-name">${p}${isJoker?'<span class="joker-tag">+1</span>':""}</span>
      <div class="saisie-eq-btns">${btns}</div>
    </div>`;
  }).join("")}</div>`;
}

function _buildMatchCardHTML(m, idx, teams) {
  const teamOpts = sel => teams.map(t => `<option value="${t}" ${sel===t?"selected":""}>${TEAM_LABEL[t]||t}</option>`).join("");
  const pA = m.eqA ? _playersOfTeam(m.eqA) : [];
  const pB = m.eqB ? _playersOfTeam(m.eqB) : [];
  const butSelHTML = (side, list, buteurs, passeurs, score, otherList) =>
    Array.from({length: score}, (_,j) => {
      const v  = buteurs[j]  || "";
      const pv = passeurs[j] || "";
      const isCSC = v === "CSC";
      const opts  = ["", "CSC", ...list].map(p => `<option value="${p}" ${v===p?"selected":""}>${p==="CSC"?"CSC (c.s.c.)":p||"— Buteur —"}</option>`).join("");
      if (isCSC) {
        const aOpts = ["", ...(otherList||[])].map(p => `<option value="${p}" ${pv===p?"selected":""}>${p||"— Auteur du CSC —"}</option>`).join("");
        return `<div class="saisie-goal-row">
          <select class="saisie-select saisie-buteur-sel" data-match="${idx}" data-side="${side}" data-goal="${j}">${opts}</select>
          <select class="saisie-select saisie-passeur-sel" data-match="${idx}" data-side="${side}" data-goal="${j}" style="opacity:1;font-size:13px">${aOpts}</select>
        </div>`;
      }
      const popts = ["", ...list].map(p => `<option value="${p}" ${pv===p?"selected":""}>${p||"— Passeur (opt.) —"}</option>`).join("");
      return `<div class="saisie-goal-row">
        <select class="saisie-select saisie-buteur-sel${v===""?" saisie-buteur-empty":""}" data-match="${idx}" data-side="${side}" data-goal="${j}">${opts}</select>
        <select class="saisie-select saisie-passeur-sel" data-match="${idx}" data-side="${side}" data-goal="${j}">${popts}</select>
      </div>`;
    }).join("");
  const gardienOpts = (val, players) =>
    ["", ...players].map(p => `<option value="${p}" ${val===p?"selected":""}>${p||"— Gardien (opt.) —"}</option>`).join("");
  const mt1A = m.mt1A ?? 0;
  const mt1B = m.mt1B ?? 0;
  const gardiensA = m.gardiensA || ["",""];
  const gardiensB = m.gardiensB || ["",""];
  const lblA = TEAM_LABEL[m.eqA]||m.eqA||"Éq.A";
  const lblB = TEAM_LABEL[m.eqB]||m.eqB||"Éq.B";
  // 4 joueurs → gardien fourni par le banc ; 5+ → gardien de l'équipe elle-même
  const benchTeam = ["Rouge","Vert","Bleue"].find(t => t !== m.eqA && t !== m.eqB) || "";
  const pBench = benchTeam ? _playersOfTeam(benchTeam) : [];
  const gardienPoolA = pA.length >= 5 || !pBench.length ? pA : pBench;
  const gardienPoolB = pB.length >= 5 || !pBench.length ? pB : pBench;
  const gardienLblA = pA.length >= 5 || !pBench.length ? lblA : (TEAM_LABEL[benchTeam]||benchTeam);
  const gardienLblB = pB.length >= 5 || !pBench.length ? lblB : (TEAM_LABEL[benchTeam]||benchTeam);
  const showButeurs = m.scoreA > 0 || m.scoreB > 0;
  return `<div class="saisie-match-card">
    <div class="saisie-match-row">
      <span class="saisie-match-num">#${idx+1}</span>
      <select class="saisie-select saisie-team-sel" data-match="${idx}" data-side="A">${teamOpts(m.eqA)}</select>
      <input type="number" class="saisie-score-input" min="0" max="20" data-match="${idx}" data-side="A" value="${m.scoreA}">
      <span class="saisie-dash">–</span>
      <input type="number" class="saisie-score-input" min="0" max="20" data-match="${idx}" data-side="B" value="${m.scoreB}">
      <select class="saisie-select saisie-team-sel" data-match="${idx}" data-side="B">${teamOpts(m.eqB)}</select>
      <button class="saisie-remove-match" data-match="${idx}">✕</button>
    </div>
    <div class="saisie-mt-section">
      <div class="saisie-mt-header">
        🧤 <strong style="font-size:11px;letter-spacing:.04em;color:var(--text2)">MI-TEMPS</strong>
        <input type="number" class="saisie-mt1-input" min="0" max="20" data-match="${idx}" data-side="A" value="${mt1A}">
        <span class="saisie-dash" style="font-size:14px">–</span>
        <input type="number" class="saisie-mt1-input" min="0" max="20" data-match="${idx}" data-side="B" value="${mt1B}">
      </div>
      <div class="saisie-gardiens-pair">
        <div class="saisie-gardien-col">
          <span class="saisie-gardien-col-label">${gardienLblA}</span>
          <div class="saisie-gardien-mt-row"><span class="mt-label">MT1</span><select class="saisie-select saisie-gardien-sel" style="flex:1;min-width:0;font-size:12px" data-match="${idx}" data-side="A" data-mt="0">${gardienOpts(gardiensA[0]||"", gardienPoolA)}</select></div>
          <div class="saisie-gardien-mt-row"><span class="mt-label">MT2</span><select class="saisie-select saisie-gardien-sel" style="flex:1;min-width:0;font-size:12px" data-match="${idx}" data-side="A" data-mt="1">${gardienOpts(gardiensA[1]||"", gardienPoolA)}</select></div>
        </div>
        <div class="saisie-gardien-col">
          <span class="saisie-gardien-col-label">${gardienLblB}</span>
          <div class="saisie-gardien-mt-row"><span class="mt-label">MT1</span><select class="saisie-select saisie-gardien-sel" style="flex:1;min-width:0;font-size:12px" data-match="${idx}" data-side="B" data-mt="0">${gardienOpts(gardiensB[0]||"", gardienPoolB)}</select></div>
          <div class="saisie-gardien-mt-row"><span class="mt-label">MT2</span><select class="saisie-select saisie-gardien-sel" style="flex:1;min-width:0;font-size:12px" data-match="${idx}" data-side="B" data-mt="1">${gardienOpts(gardiensB[1]||"", gardienPoolB)}</select></div>
        </div>
      </div>
    </div>
    ${showButeurs ? `<div class="saisie-buteurs-row">
      <div class="saisie-buteurs-side">
        <span class="saisie-buteurs-label">${lblA}</span>
        <div class="saisie-buteurs-sels">${butSelHTML("A",pA,m.buteursA,m.passeursA||[],m.scoreA,pB)||'<span style="color:var(--fg3);font-size:12px">—</span>'}</div>
      </div>
      <div class="saisie-buteurs-side">
        <span class="saisie-buteurs-label">${lblB}</span>
        <div class="saisie-buteurs-sels">${butSelHTML("B",pB,m.buteursB,m.passeursB||[],m.scoreB,pA)||'<span style="color:var(--fg3);font-size:12px">—</span>'}</div>
      </div>
    </div>` : ""}
  </div>`;
}

function _buildMatchsSectionHTML() {
  const teams = _activeTeams();
  if (teams.length < 2) return `<p class="saisie-empty">Assignez au moins 2 équipes pour ajouter des matchs.</p>
    <button class="saisie-add-match" id="saisie-add-match" disabled style="opacity:.4;cursor:default">+ Ajouter un match</button>`;
  return (_draft.matchs || []).map((m, i) => _buildMatchCardHTML(m, i, teams)).join("") +
    `<button class="saisie-add-match" id="saisie-add-match">+ Ajouter un match</button>`;
}

function renderSaisie() {

  const regularPlayers = ALL_PLAYERS.filter(p => !JOKERS.has(p)).sort((a, b) => a.localeCompare(b, "fr"));
  const jokerPlayers   = ALL_PLAYERS.filter(p =>  JOKERS.has(p)).sort((a, b) => a.localeCompare(b, "fr"));
  const countPresents = Object.values(_draft.presences).filter(v => v.statut === "Présent").length;
  const countAbsents  = Object.entries(_draft.presences).filter(([k, v]) => !JOKERS.has(k) && !(_draft.tempJokers||[]).includes(k) && v.statut === "Absent").length;
  const countBlesses  = Object.entries(_draft.presences).filter(([k, v]) => !JOKERS.has(k) && !(_draft.tempJokers||[]).includes(k) && v.statut === "Blessé").length;
  const sacOpts    = ["", ...presents].map(p => `<option value="${p}" ${_draft.sac===p?"selected":""}>${p||"— non défini —"}</option>`).join("");
  const mailOpts   = ["", ...presents].map(p => `<option value="${p}" ${_draft.maillots===p?"selected":""}>${p||"— non défini —"}</option>`).join("");
  const statusTxt  = _draftSavedAt

  document.getElementById("saisie-content").innerHTML = `<div class="saisie-wrap">

    ${_editMode ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;padding:10px 14px;background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);border-radius:10px;font-size:13px;color:var(--gold)">✏️&ensp;<strong>Mode édition</strong>&ensp;<span style="color:var(--text2)">— Session du ${fmtDate(_draft.date)}</span></div>` : ""}
    <div class="saisie-bar">
      <span id="saisie-status" class="saisie-status">${_editMode ? "" : statusTxt}</span>
      <div class="saisie-actions">
        ${_editMode ? "" : `<button class="saisie-btn secondary" id="saisie-save">Enregistrer</button>`}
        ${_editMode
          ? `<button class="saisie-btn secondary" id="saisie-cancel-edit">Annuler</button>`
          : `<button class="saisie-btn danger" id="saisie-clear">Effacer</button>`}
        <button class="saisie-btn primary" id="saisie-commit">${_editMode ? "Mettre à jour ✓" : "Valider ✓"}</button>
      </div>
    </div>

    <div class="saisie-section">
      <div class="saisie-section-title">📅 Date de la session</div>
      <input type="date" class="saisie-date-input" id="saisie-date" value="${_draft.date}"${_editMode ? ' readonly style="opacity:.55;cursor:not-allowed"' : ''}>
    </div>

    <div class="saisie-section">
      <div class="saisie-section-title">👥 Présences</div>
      <div style="display:flex;gap:16px;margin-bottom:14px;font-size:13px;font-weight:600">
        <span style="color:#66bb6a">✅ ${countPresents} présent${countPresents>1?"s":""}</span>
        <span style="color:#ef5350">❌ ${countAbsents} absent${countAbsents>1?"s":""}</span>
        <span style="color:#ffa726">🤕 ${countBlesses} blessé${countBlesses>1?"s":""}</span>
      </div>
      <div class="saisie-presences-grid">
        ${regularPlayers.map(p => _presenceRowHTML(p, _draft.presences[p]?.statut||"Pas répondu", false)).join("")}
      </div>
      <div class="saisie-jokers-title">Joueurs +1</div>
      <div class="saisie-presences-grid">
        ${jokerPlayers.map(p => _presenceRowHTML(p, _draft.presences[p]?.statut||_JOKER_NC, true, false)).join("")}
        ${(_draft.tempJokers||[]).map(p => _presenceRowHTML(p, _draft.presences[p]?.statut||"Présent", true, true)).join("")}
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;align-items:center">

function _reRenderEquipes() {
  const sec = document.getElementById("saisie-equipes-section");
  if (!sec) return;
  sec.innerHTML = `<div class="saisie-section-title">🎽 Équipes</div>${_buildEquipesHTML()}`;
}

function _reRenderMatchs() {
  const sec = document.getElementById("saisie-matchs-section");
  if (!sec) return;
  sec.innerHTML = `<div class="saisie-section-title">⚽ Matchs</div>${_buildMatchsSectionHTML()}`;
}

async function _commitSession() {
  if (!_draft.date) { alert("Veuillez saisir une date pour la session."); return; }
  if (!_editMode && SESSIONS.find(s => s.date === _draft.date)) {
    alert(`Une session du ${fmtDate(_draft.date)} existe déjà.`); return;
  }
  const emptyButeurs = _draft.matchs.some(m =>
    (m.buteursA || []).some(b => !b) || (m.buteursB || []).some(b => !b)
  );
  if (emptyButeurs) {
    alert("Certains buteurs ne sont pas renseignés.\nVeuillez sélectionner un joueur ou « CSC » pour chaque but."); return;
  }
  if (!confirm(_editMode
    ? `Mettre à jour la session du ${fmtDate(_draft.date)} ?`
    : `Valider la session du ${fmtDate(_draft.date)} ?\n\nCette action est définitive.`)) return;

  const finalPresences = {};
  Object.entries(_draft.presences).forEach(([p, info]) => {
    if (info.statut === _JOKER_NC) return;
    finalPresences[p] = { statut: info.statut, equipe: info.equipe || "" };
    if ((JOKERS.has(p) || (_draft.tempJokers||[]).includes(p)) && info.statut === "Présent") finalPresences[p].joker = true;
  });

  const finalSession = {
    date: _draft.date,
    ...(_draft.sac      ? { sac:      _draft.sac      } : {}),
    ...(_draft.maillots ? { maillots: _draft.maillots } : {}),
    presences: finalPresences,
    matchs: _draft.matchs.map(m => ({
      eqA: m.eqA, eqB: m.eqB, scoreA: m.scoreA, scoreB: m.scoreB,
      buteursA:  (m.buteursA  || []).filter(b => b),
      buteursB:  (m.buteursB  || []).filter(b => b),
      passeursA: (m.passeursA || []).slice(0, m.scoreA),
      passeursB: (m.passeursB || []).slice(0, m.scoreB),
      mt1A: m.mt1A || 0, mt1B: m.mt1B || 0,
      gardiensA: (m.gardiensA || ["",""]).map(g => g || ""),
      gardiensB: (m.gardiensB || ["",""]).map(g => g || "")
    }))
  };

  const overlay = document.getElementById("fb-saving-overlay");
  if (overlay) overlay.style.display = "flex";
  window.onbeforeunload = () => "La session est en cours de sauvegarde. Quitter maintenant perdra vos données.";

  if (_editMode) {
    const idx = SESSIONS.findIndex(s => s.date === finalSession.date);
    if (idx !== -1) SESSIONS[idx] = finalSession; else SESSIONS.push(finalSession);
  } else {
    SESSIONS.push(finalSession);
  }

  try {
    await _fbSaveSession(finalSession);
  } catch(err) {
    if (overlay) overlay.style.display = "none";
    window.onbeforeunload = null;
    alert('⚠️ Firebase — erreur de synchronisation :\n' + (err?.message || err?.code || String(err)));
    return;
  }

  if (overlay) overlay.style.display = "none";
  window.onbeforeunload = null;

  /* Persister les nouveaux temp jokers dans ALL_PLAYERS + JOKERS */
  const _newJokers = (_draft.tempJokers || []).filter(n => !ALL_PLAYERS.includes(n));
  if (_newJokers.length) {
    _newJokers.forEach(n => { ALL_PLAYERS.push(n); JOKERS.add(n); });
    _saveJokers();
    _saveExtraPlayers();
  }

  _draft = null;
  _draftSavedAt = null;
  _editMode = false;
  localStorage.removeItem("hmft_draft");
  if (_db) _db.ref('config/draft').remove().catch(() => {});

  // Naviguer vers la session validée
  const dateNav = finalSession.date;
  document.querySelectorAll(".main-tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelector(".main-tab[data-tab='session']").classList.add("active");
  document.getElementById("panel-session").classList.add("active");
  populateSessionSelect();
  document.getElementById("session-date").value = dateNav;
  renderSessionResults(dateNav);
}

/* ── Événements saisie (attachés une seule fois) ── */
document.getElementById("saisie-content").addEventListener("click", e => {
  if (!_draft) return;

  const statBtn = e.target.closest(".saisie-statut-btn");
  if (statBtn) {
    const p = statBtn.dataset.player; const s = statBtn.dataset.statut;
    if (!_draft.presences[p]) _draft.presences[p] = { statut: s, equipe: "" };
    _draft.presences[p].statut = s;
    if (s !== "Présent") _draft.presences[p].equipe = "";
    renderSaisie(); return;
  }
  if (e.target.id === "saisie-save")   { _saveDraft(); return; }
  if (e.target.id === "saisie-cancel-edit") {
    _editMode = false;
    _draft = null;
    document.querySelectorAll(".main-tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    document.querySelector(".main-tab[data-tab='session']").classList.add("active");
    document.getElementById("panel-session").classList.add("active");
    return;
  }
  if (e.target.id === "saisie-clear") {
    if (confirm("Effacer le brouillon en cours ?")) {
      _draft = _newDraft(); _draftSavedAt = null;
      localStorage.removeItem("hmft_draft");
      if (_db) _db.ref('config/draft').remove().catch(() => {});
      renderSaisie();
    }
    return;
  }
  if (e.target.id === "saisie-commit") { _commitSession(); return; }
  if (e.target.id === "saisie-add-match") {
    const teams = _activeTeams();
    if (!Array.isArray(_draft.matchs)) _draft.matchs = [];
    _draft.matchs.push({ eqA: teams[0]||"", eqB: teams[1]||"", scoreA: 0, scoreB: 0, buteursA: [], buteursB: [], passeursA: [], passeursB: [], mt1A: 0, mt1B: 0, gardiensA: ["",""], gardiensB: ["",""] });
    _reRenderMatchs(); return;
  }
  const rmBtn = e.target.closest(".saisie-remove-match");
  if (rmBtn) { _draft.matchs.splice(Number(rmBtn.dataset.match), 1); _reRenderMatchs(); return; }

  if (e.target.id === "saisie-add-temp-joker") {
    const input = document.getElementById("saisie-new-joker-input");
    const name = (input?.value || "").trim();
    if (!name) return;
    if (ALL_PLAYERS.includes(name) || (_draft.tempJokers||[]).includes(name)) {
      alert(`"${name}" est déjà dans la liste.`); return;
    }
    if (/[.#$\/\[\]]/.test(name)) {
      alert(`Le nom "${name}" contient un caractère interdit ( . # $ / [ ] ).\nVeuillez le modifier.`); return;
    }
    if (!_draft.tempJokers) _draft.tempJokers = [];
    _draft.tempJokers.push(name);
    _draft.presences[name] = { statut: "Présent", equipe: "", joker: true, temp: true };
    renderSaisie(); return;
  }

  const rmTempBtn = e.target.closest(".saisie-remove-temp-joker");
  if (rmTempBtn) {
    const name = rmTempBtn.dataset.player;
    _draft.tempJokers = (_draft.tempJokers||[]).filter(p => p !== name);
    delete _draft.presences[name];
    renderSaisie(); return;
  }

  const eqBtn = e.target.closest(".saisie-eq-btn");
  if (eqBtn) {
    const p = eqBtn.dataset.player; const eq = eqBtn.dataset.equipe;
    if (_draft.presences[p]) {
      _draft.presences[p].equipe = _draft.presences[p].equipe === eq ? "" : eq;
    }
    _reRenderEquipes(); _reRenderMatchs(); return;
  }
});

document.getElementById("saisie-content").addEventListener("change", e => {
  if (!_draft) return;
  if (e.target.id === "saisie-date")     { _draft.date = e.target.value; return; }
  if (e.target.id === "saisie-sac")      { _draft.sac = e.target.value; return; }
  if (e.target.id === "saisie-maillots") { _draft.maillots = e.target.value; return; }

  const teamSel = e.target.closest(".saisie-team-sel");
  if (teamSel) {
    const idx = Number(teamSel.dataset.match); const side = teamSel.dataset.side;
    _draft.matchs[idx][side === "A" ? "eqA" : "eqB"] = e.target.value;
    _reRenderMatchs(); return;
  }
  const scoreInput = e.target.closest(".saisie-score-input");
  if (scoreInput) {
    const idx = Number(scoreInput.dataset.match); const side = scoreInput.dataset.side;
    const val = Math.max(0, parseInt(e.target.value) || 0);
    const field  = side === "A" ? "scoreA"    : "scoreB";
    const bfield = side === "A" ? "buteursA"  : "buteursB";
    const pfield = side === "A" ? "passeursA" : "passeursB";
    _draft.matchs[idx][field]  = val;
    _draft.matchs[idx][bfield] = (_draft.matchs[idx][bfield] || []).slice(0, val);
    while (_draft.matchs[idx][bfield].length < val) _draft.matchs[idx][bfield].push("");
    _draft.matchs[idx][pfield] = (_draft.matchs[idx][pfield] || []).slice(0, val);
    while (_draft.matchs[idx][pfield].length < val) _draft.matchs[idx][pfield].push("");
    _reRenderMatchs(); return;
  }
  const buteurSel = e.target.closest(".saisie-buteur-sel");
  if (buteurSel) {
    const idx = Number(buteurSel.dataset.match); const side = buteurSel.dataset.side;
    const goal = Number(buteurSel.dataset.goal);
    const prevVal = _draft.matchs[idx][side === "A" ? "buteursA" : "buteursB"][goal];
    _draft.matchs[idx][side === "A" ? "buteursA" : "buteursB"][goal] = e.target.value;
    if (e.target.value === "CSC" || prevVal === "CSC") {
      _draft.matchs[idx][side === "A" ? "passeursA" : "passeursB"][goal] = "";
      _reRenderMatchs();
    }
    return;
  }
  const passeurSel = e.target.closest(".saisie-passeur-sel");
  if (passeurSel) {
    const idx = Number(passeurSel.dataset.match); const side = passeurSel.dataset.side;
    const goal = Number(passeurSel.dataset.goal);
    _draft.matchs[idx][side === "A" ? "passeursA" : "passeursB"][goal] = e.target.value;
    return;
  }
  const mt1Input = e.target.closest(".saisie-mt1-input");
  if (mt1Input) {
    const idx = Number(mt1Input.dataset.match); const side = mt1Input.dataset.side;
    _draft.matchs[idx][side === "A" ? "mt1A" : "mt1B"] = Math.max(0, parseInt(e.target.value) || 0);
    return;
  }
  const gardienSel = e.target.closest(".saisie-gardien-sel");
  if (gardienSel) {
    const idx = Number(gardienSel.dataset.match); const side = gardienSel.dataset.side;
    const mt = Number(gardienSel.dataset.mt);
    const field = side === "A" ? "gardiensA" : "gardiensB";
    if (!_draft.matchs[idx][field]) _draft.matchs[idx][field] = ["",""];
    _draft.matchs[idx][field][mt] = e.target.value;
    return;
  }
});

/* ══════════════════════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════════════════════ */

function _easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function animateCounters(root) {
  const sel = '.kpi-num, .pe-count, .rc-num, .ts-num, .pp-stat-val';
  (root || document).querySelectorAll(sel).forEach(el => {
    if (el.childElementCount > 0) return;
    const raw = el.textContent.trim();
    const m = raw.match(/^([+\-]?)(\d+(?:[,\.]\d+)?)(.*)$/);
    if (!m) return;
    const sign = m[1], num = m[2], suffix = m[3] || '';
    const target = parseFloat(num.replace(',', '.'));
    if (isNaN(target) || target === 0) return;
    const isFloat = num.includes(',') || num.includes('.');
    const t0 = performance.now();
    const fmt = v => sign + (isFloat ? v.toFixed(1).replace('.', ',') : String(Math.round(v))) + suffix;
    (function tick(ts) {
      const p = Math.min((ts - t0) / 650, 1);
      el.textContent = fmt(target * _easeOut(p));
      if (p < 1) requestAnimationFrame(tick);
    })(performance.now());
  });
}

function animateCards(root) {
  const sel = '.kpi-card, .match-card, .record-card, .top-scorer-hero, .team-card, .buts-row, .pp-stat-card, .pp-match-card';
  [...(root || document).querySelectorAll(sel)].forEach((el, i) => {
    el.style.opacity    = '0';
    el.style.transform  = 'translateY(8px)';
    el.style.transition = 'none';
    setTimeout(() => {
      el.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
      el.style.opacity    = '';
      el.style.transform  = '';
    }, i * 40 + 20);
  });
}

function animateRows(root) {
  const sel = '.podium-entry, .palmares-row, .pp-teammate-row';
  [...(root || document).querySelectorAll(sel)].forEach((el, i) => {
    el.style.opacity    = '0';
    el.style.transform  = 'translateX(-8px)';
    el.style.transition = 'none';
    setTimeout(() => {
      el.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
      el.style.opacity    = '';
      el.style.transform  = '';
    }, i * 48 + 50);
  });
}

function animateTable() {
  document.querySelectorAll('.players-table').forEach(table => {
    const wrap  = table.closest('.players-table-wrap');
    const thead = table.querySelector('thead tr');
    const rows  = [...table.querySelectorAll('tbody tr')];
    const vCols = [...table.querySelectorAll('thead th:first-child, tbody td.name')];
    if (!rows.length) return;

    if (wrap)  { wrap.style.opacity  = '0'; wrap.style.transition  = 'none'; }
    if (thead) { thead.style.opacity = '0'; thead.style.transition = 'none'; }
    vCols.forEach(c => { c.style.borderRightColor = 'transparent'; c.style.transition = 'none'; });
    rows.forEach(r  => { r.style.opacity = '0'; r.style.transform = 'translateX(-5px)'; r.style.transition = 'none'; });

    setTimeout(() => {
      if (wrap) { wrap.style.transition = 'opacity 0.15s ease'; wrap.style.opacity = '1'; }
    }, 10);
    setTimeout(() => {
      if (thead) { thead.style.transition = 'opacity 0.2s ease'; thead.style.opacity = '1'; }
    }, 150);
    setTimeout(() => {
      vCols.forEach(c => { c.style.transition = 'border-right-color 0.28s ease'; c.style.borderRightColor = ''; });
    }, 260);
    rows.forEach((r, i) => {
      setTimeout(() => {
        r.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
        r.style.opacity    = '1';
        r.style.transform  = 'translateX(0)';
      }, 350 + i * 28);
    });
  });
}

function animateView(root) {
  animateCards(root);
  animateRows(root);
  animateCounters(root);
}

document.getElementById("pp-close").addEventListener("click", closePlayerPanel);

  const btn = e.target.closest(".player-link");

/* ── Tooltip hauts faits ── */
{
  const _tip = document.createElement('div');
  _tip.id = 'ach-tip'; document.body.appendChild(_tip);
  let _tipCell = null;
  const _pp = document.getElementById('player-panel');
  _pp.addEventListener('pointermove', e => {
    const cell = e.target.closest('.ach-cell[data-tip]');
    if (!cell) { _tip.classList.remove('show'); _tipCell=null; return; }
    if (cell !== _tipCell) {
      _tipCell = cell;
      const [l0,...lines] = (cell.dataset.tip||'').split('\n');
      _tip.innerHTML = `<div class="atn">${l0}</div>${lines.map((l,i)=>`<div class="${i===0?'atv':'atn2'}">${l}</div>`).join('')}`;
    }
    const tw=_tip.offsetWidth||180, th=_tip.offsetHeight||55;
    _tip.style.left=Math.min(e.clientX+14, window.innerWidth-tw-8)+'px';
    _tip.style.top=Math.max(e.clientY-th-10, 8)+'px';
    _tip.classList.add('show');
  });
  _pp.addEventListener('pointerleave', ()=>{ _tip.classList.remove('show'); _tipCell=null; });
}

/* ── Init async ── */
(async function() {
  await _fbLoad();

  const _hash = location.hash.slice(1);
  let _loadSaisie = false;
  if (_hash === "saisie") {
    if (sessionStorage.getItem("hmft_role") === "admin") {
      document.querySelectorAll(".main-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      document.getElementById("panel-saisie").classList.add("active");
      _loadSaisie = true;
    } else {
      history.replaceState(null, '', '#last');
    }
  } else if (_hash === "joueurs" || _hash === "sessions" || _hash === "stats") {
    const _tabKey = _hash === "sessions" ? "session" : _hash;
    document.querySelectorAll(".main-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === _tabKey));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === `panel-${_tabKey}`));
  } else if (["last","month","year","all"].includes(_hash)) {
    currentPeriod = _hash;
    document.querySelectorAll(".pill").forEach(p => p.classList.toggle("active", p.dataset.period === currentPeriod));
  }
  updateSubFilter(currentPeriod);
  renderDashboard();
  populateSessionSelect();
  renderJoueurs();
  if (_hash === "stats") renderStats();
  if (_loadSaisie) renderSaisie();
  if (SESSIONS.length) {
    const sorted = [...SESSIONS].sort((a,b) => new Date(b.date)-new Date(a.date));
    renderSessionResults(sorted[0].date);
  } else {
    document.getElementById("session-results").innerHTML =
      `<p class="no-data" style="margin-top:1rem">Aucune session enregistrée.</p>`;
  }

  applyRole(sessionStorage.getItem("hmft_role") === "admin" ? "admin" : "user");
  updateAdminBtn();
  document.getElementById("loading-screen").style.display = "none";
})();
