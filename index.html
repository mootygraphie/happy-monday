function buildAggTop3(ranked, unitS, unitP) {
  const slots = []; let rem = [...ranked];
  while (rem.length > 0 && slots.length < 3) {
    const topN = rem[0][1];
    slots.push({ rank: slots.length, players: rem.filter(([,n])=>n===topN).map(([n])=>n), count: topN });
    rem = rem.filter(([,n]) => n < topN);
  }
  if (slots.length === 0) return `<span class="no-data">—</span>`;
  return buildPodiumVizSlots(
    slots,
    s => `${s.count} ${s.count > 1 ? unitP : unitS}`,
    s => s.players.map(n => pLink(n)).join(", ")
  );
}

function buildPresencePodium(entries) {
  if (!entries || !entries.length) return `<span class="no-data">—</span>`;
  const slots = entries.map(([name, stats], i) => ({ rank: i, players: [name], count: stats.presences }));
  return buildPodiumVizSlots(
    slots,
    s => `${s.count} sess.`,
    s => s.players.map(n => pLink(n)).join(", ")
  );
}

function computeBestAllTimeStreak() {
  let best = null;
  ALL_PLAYERS.filter(p => !JOKERS.has(p)).forEach(player => {
    const st = computePlayerDetailStats(player);
    const cs = st.currentStreak;
    const hs = st.bestHistoricalStreak;
    let candidate = null;
    if (cs && hs) {
      if (cs.count > hs.count || (cs.count === hs.count && (cs.g + cs.a) >= (hs.g + hs.a))) {
        candidate = { player, ...cs, isActive: true };
      } else {
        candidate = { player, ...hs, isActive: false };
      }
    } else if (cs) {
      candidate = { player, ...cs, isActive: true };
    } else if (hs) {
      candidate = { player, ...hs, isActive: false };
    }
    if (!candidate) return;
    if (!best || candidate.count > best.count ||
        (candidate.count === best.count && (candidate.g + candidate.a) > (best.g + best.a))) {
      best = candidate;
    }
  });
  return best;
}

function buildBallonDorHtml() {
  const _bdYear = new Date().getFullYear();
  const _bdPs = {};
  SESSIONS.filter(s => new Date(s.date).getFullYear() === _bdYear).forEach(s => {
    (s.matchs || []).forEach(m => {
      ["A","B"].forEach(side => {
        const buts = m[`buteurs${side}`]||[], passes = m[`passeurs${side}`]||[];
        buts.forEach((b,i) => {
          if (!b || b==="CSC") return;
          if (!_bdPs[b]) _bdPs[b]={buts:0,passes:0}; _bdPs[b].buts++;
          const p = passes[i]; if (p && p!=="CSC") { if (!_bdPs[p]) _bdPs[p]={buts:0,passes:0}; _bdPs[p].passes++; }
        });
      });
    });
  });
  const _bdTop5 = Object.entries(_bdPs)
    .map(([name, p]) => ({ name, buts: p.buts, passes: p.passes, pts: p.buts * 10 + p.passes * 5 }))
    .filter(p => p.pts > 0)
    .sort((a, b) => b.pts - a.pts || b.buts - a.buts || a.name.localeCompare(b.name, "fr"))
    .slice(0, 5);
  const _bdMedals = ["🥇","🥈","🥉"];
  let html = `<div class="ballon-dor-card" style="margin-bottom:2rem">
    <div class="ballon-dor-head">
      <span class="ballon-dor-icon">🏆</span>
      <div>
        <div class="ballon-dor-title">Ballon d'Or ${_bdYear}</div>
        <div class="ballon-dor-meta">Classement G/A — Janvier à aujourd'hui</div>
      </div>
      <div class="ballon-dor-formula">10 pts / but &nbsp;·&nbsp; 5 pts / assist</div>
    </div>
    <div class="bd-list">`;
  if (_bdTop5.length) {
    const _bdMax = _bdTop5[0].pts;
    _bdTop5.forEach((p, i) => {
      const _bdRank = i < 3 ? `<span class="bd-rank">${_bdMedals[i]}</span>` : `<span class="bd-rank num">${i+1}</span>`;
      const _bdGa = [p.buts > 0 ? `${p.buts}G` : null, p.passes > 0 ? `${p.passes}A` : null].filter(Boolean).join(" · ");
      const _bdBar = Math.round((p.pts / _bdMax) * 100);
      html += `<div class="bd-row${i===0?" bd-first":""}">
        ${_bdRank}
        <span class="bd-name">${pLink(p.name)}</span>
        <div class="bd-bar-wrap"><div class="bd-bar" style="width:${_bdBar}%"></div></div>
        <span class="bd-pts">${p.pts}</span>
        <span class="bd-ga">${_bdGa}</span>
      </div>`;
    });
  } else {
    html += `<div style="padding:20px 22px;color:var(--text3);font-size:13px;font-style:italic">Aucun but ou passe enregistré en ${_bdYear} pour le moment.</div>`;
  }
  html += `</div></div>`;
  return html;
}

      const _bdBar = Math.round((p.pts / _bdMax) * 100);

function _buildAbsenceRankHtml({ icon, title, subtitle, accentColor, borderColor, players, emptyMsg }) {
  let html = `<div style="background:var(--bg2);border:1px solid ${borderColor};border-radius:var(--radius-lg);overflow:hidden;margin-bottom:2rem;position:relative">
    <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,${accentColor},transparent);pointer-events:none"></div>
    <div class="ballon-dor-head" style="background:rgba(0,0,0,.04);border-bottom-color:${borderColor}">
      <span class="ballon-dor-icon">${icon}</span>
      <div>
        <div class="ballon-dor-title" style="color:var(--text2)">${title}</div>
        <div class="ballon-dor-meta">${subtitle}</div>
      </div>
    </div>
    <div class="bd-list">`;
  if (players.length) {
    const maxVal = Math.max(...players.map(p => p.val), 1);
    players.forEach((p, i) => {
      const isFirst = i === 0;
      const rowStyle = isFirst ? ` style="padding:14px 22px;background:rgba(0,0,0,.04);border-bottom:1px solid ${borderColor}"` : '';
      const bar = Math.round((p.val / maxVal) * 100);
      html += `<div class="bd-row"${rowStyle}>
        <span class="bd-rank num">${i+1}</span>
        <span class="bd-name"${isFirst?' style="font-size:16px;font-weight:700"':''}>${pLink(p.name)}</span>
        <div class="bd-bar-wrap"><div class="bd-bar" style="width:${bar}%;background:linear-gradient(90deg,${accentColor},${accentColor}44)"></div></div>
        <span class="bd-pts" style="color:var(--text2)${isFirst?';font-size:18px':''}">${p.val}</span>
        <span class="bd-ga" style="${isFirst?'color:var(--text2)':''}">${p.extra !== undefined ? p.extra : '×'}</span>
      </div>`;
    });
  } else {
    html += `<div style="padding:20px 22px;color:var(--text3);font-size:13px;font-style:italic">${emptyMsg}</div>`;
  }
  html += `</div></div>`;
  return html;
}

function buildBonnetDAneHtml() {
  const yr = new Date().getFullYear();
  const absMap = {};
  SESSIONS.filter(s => new Date(s.date).getFullYear() === yr).forEach(s => {
    Object.entries(s.presences).forEach(([p, info]) => {
      if (info.statut === "Absent" && !JOKERS.has(p)) absMap[p] = (absMap[p]||0)+1;
    });
  });
  const top5 = Object.entries(absMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([name,val])=>({name,val}));
  return _buildAbsenceRankHtml({
    icon:'🫏', title:`Bonnet d'Âne ${yr}`, subtitle:`Classement absences — Janvier à aujourd'hui`,
    accentColor:'rgba(239,68,68,.55)', borderColor:'rgba(239,68,68,.22)',
    players: top5, emptyMsg:`Aucune absence enregistrée en ${yr}.`
  });
}

function buildInfirmeHtml() {
  const yr = new Date().getFullYear();
  const injEpMap = {}; const injMatchMap = {}; const injEp = {};
  const _ss = [...SESSIONS].filter(s=>new Date(s.date).getFullYear()===yr).sort((a,b)=>new Date(a.date)-new Date(b.date));
  _ss.forEach(s => {
    Object.entries(s.presences).forEach(([p, info]) => {
      if (!injEp[p]) injEp[p] = false;
      if (info.statut === "Blessé" && !JOKERS.has(p)) {
        if (!injEp[p]) { injEpMap[p] = (injEpMap[p]||0)+1; injEp[p]=true; }
        injMatchMap[p] = (injMatchMap[p]||0)+1;
      } else { injEp[p] = false; }
    });
  });
  const top5 = Object.entries(injMatchMap)
    .sort((a,b)=>b[1]-a[1]||((injEpMap[b[0]]||0)-(injEpMap[a[0]]||0)))
    .slice(0,5)
    .map(([name,val])=>{
      const ep = injEpMap[name]||0;
      return { name, val, extra: `${ep} blessure${ep>1?'s':''}` };
    });
  return _buildAbsenceRankHtml({
    icon:'🩼', title:`Infirmerie ${yr}`, subtitle:`Classement matchs manqués — Janvier à aujourd'hui`,
    accentColor:'rgba(245,158,11,.55)', borderColor:'rgba(245,158,11,.22)',
    players: top5, emptyMsg:`Aucune blessure enregistrée en ${yr}.`
  });
}

function computeBestTeamAllTime() {
  let best = null;
  SESSIONS.forEach(session => {
    const matchs = session.matchs || [];
    if (!matchs.length) return;
    ["Rouge", "Vert", "Bleue"].forEach(team => {
      const tmMatchs = matchs.filter(m => m.eqA === team || m.eqB === team);
      if (!tmMatchs.length) return;
      let wins = 0, goalsFor = 0, goalsAgainst = 0;
      const scorers = {}, assisters = {};
      tmMatchs.forEach(m => {
        const isA = m.eqA === team;
        const gf = isA ? m.scoreA : m.scoreB;
        const ga = isA ? m.scoreB : m.scoreA;
        goalsFor += gf; goalsAgainst += ga;
        if (gf > ga) wins++;
        (isA ? (m.buteursA||[])  : (m.buteursB||[])).forEach(p  => { if (p && p !== "CSC") scorers[p]   = (scorers[p]   || 0) + 1; });
        (isA ? (m.passeursA||[]) : (m.passeursB||[])).forEach(p => { if (p)                assisters[p] = (assisters[p] || 0) + 1; });
      });
      const goalDiff = goalsFor - goalsAgainst;
      const players = Object.entries(session.presences)
        .filter(([, info]) => info.statut === "Présent" && info.equipe === team)
        .map(([name]) => name).sort((a, b) => a.localeCompare(b, "fr"));
      const topSc = Object.entries(scorers).sort((a,b)=>b[1]-a[1])[0];
      const topAs = Object.entries(assisters).sort((a,b)=>b[1]-a[1])[0];
      const c = { session, team, wins, goalsFor, goalsAgainst, goalDiff, players,
        topScorer:   topSc ? { name: topSc[0], count: topSc[1] } : null,
        topAssister: topAs ? { name: topAs[0], count: topAs[1] } : null };
      if (!best || wins > best.wins || (wins === best.wins && goalDiff > best.goalDiff)) best = c;
    });
  });
  return best;
}

let _achClsStats = null;

function _achTierStyle(rawLv, ach) {
  const lv = ach.fixedTier ? ach.fixedTier : Math.min(6, rawLv + (ach.tierOffset||0));
  const S = [null,
    {bg:'rgba(107,114,128,.18)',b:'rgba(107,114,128,.38)',c:'#9CA3AF'},
    {bg:'rgba(205,127,50,.18)', b:'rgba(205,127,50,.45)', c:'#D4863A'},
    {bg:'rgba(148,163,184,.18)',b:'rgba(148,163,184,.45)',c:'#94A3B8'},
    {bg:'rgba(245,158,11,.18)', b:'rgba(245,158,11,.5)',  c:'#FBBF24'},
    {bg:'rgba(16,185,129,.16)', b:'rgba(16,185,129,.48)', c:'#34D399'},
    {bg:'rgba(167,243,255,.14)',b:'rgba(167,243,255,.42)',c:'#A5F3FC'},
  ];
  const t = S[lv] || S[1];
  const name = (ach.tierNames ? ach.tierNames[rawLv-1] : null) || ACH_TIER_NAMES[lv] || `Niv.${lv}`;
  return { ...t, name };
}

function renderAchClsBody(acid) {
  const ach = ACH_DEFS.find(a => a.id === acid);
  if (!ach || !_achClsStats) return '';
  const maxT = ach.tiers.length;

  const rows = Object.entries(_achClsStats).map(([name, s]) => {

  const unlocked = rows.filter(r => r.rawLv > 0).sort((a,b) => b.rawLv - a.rawLv || b.val - a.val);
  const locked   = rows.filter(r => r.rawLv === 0).sort((a,b) => b.val - a.val);

  const rankLabel = i => `${i+1}.`;
  const makeDots  = (rawLv, color) => maxT > 1
    ? `<div class="ach-cls-dots">${Array.from({length:maxT},(_,j)=>`<div class="ach-cls-dot" style="${j<rawLv?'background:'+color:''}"></div>`).join('')}</div>`

  unlocked.forEach((r, i) => {
    const ts = _achTierStyle(r.rawLv, ach);
    h += `<div class="ach-cls-row">
      <span class="ach-cls-rank">${rankLabel(i)}</span>

      <span class="ach-cls-val">${ach.desc(r.val)}</span>

  });

  if (locked.length) {
    h += `<details class="ach-cls-locked"><summary>${locked.length} non débloqué${locked.length!==1?'s':''}</summary>`;
    locked.forEach(r => {
      h += `<div class="ach-cls-row" style="opacity:.38">

        <button class="player-link ach-cls-name" data-player="${r.name}">${r.name}</button>
        <span class="ach-cls-val" style="color:var(--text3)">${r.val} / ${ach.tiers[0]}</span>
        ${makeDots(0, '')}

    });
    h += `</details>`;
  }
  return h;
}

/* ══════════════════════════════════════════════════════════
   RIVALITÉS
══════════════════════════════════════════════════════════ */

function computeRivalites(pA, pB, period) {
  let sessions = [...SESSIONS];
  const now = new Date();
  if (period === "year") {
    sessions = sessions.filter(s => new Date(s.date).getFullYear() === now.getFullYear());
  } else if (period === "month") {
    sessions = sessions.filter(s => {
      const d = new Date(s.date);
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    });
  }

  // Garder seulement les sessions où pA ET pB sont présents
  sessions = sessions.filter(s => {
    const pa = s.presences[pA], pb = s.presences[pB];
    return pa && pa.statut === "Présent" && pb && pb.statut === "Présent";
  });

  const result = {
    total: sessions.length,
    matchs: sessions.reduce((acc, s) => acc + (s.matchs||[]).length, 0),
    matchsDirect: 0,
    together: { sessions: 0, wA: 0, dA: 0, lA: 0, gaA: 0, gaB: 0, gA: 0, aA: 0, gB: 0, aB: 0, best: [] },
    versus:   { sessions: 0, wA: 0, dA: 0, lA: 0, wB: 0, dB: 0, lB: 0, gaA: 0, gaB: 0, gA: 0, aA: 0, gB: 0, aB: 0, best: [] },
  };

  const togetherRaw = [];
  const versusRaw   = [];

  sessions.forEach(s => {
    const eqA = s.presences[pA].equipe;
    const eqB = s.presences[pB].equipe;
    const sameEq = eqA && eqB && eqA === eqB;
    const oppEq  = eqA && eqB && eqA !== eqB;

    // G/A individuels dans la session (tous matchs)
    let gA=0, aA=0, gB=0, aB=0;
    (s.matchs||[]).forEach(m => {
      ["A","B"].forEach(side => {
        const buts   = m[`buteurs${side}`]  || [];
        const passes = m[`passeurs${side}`] || [];
        buts.forEach((b,i) => {
          if (!b || b==="CSC") return;
          const p = passes[i];
          if (b === pA) gA++;
          if (p && p!=="CSC" && p === pA) aA++;
          if (b === pB) gB++;
          if (p && p!=="CSC" && p === pB) aB++;
        });
      });
    });

    if (sameEq) {
      result.together.sessions++;
      result.together.gaA += gA + aA; result.together.gA += gA; result.together.aA += aA;
      result.together.gaB += gB + aB; result.together.gB += gB; result.together.aB += aB;

      // W/D/L communs — par match de leur équipe
      let wMatch=0, dMatch=0, lMatch=0;
      (s.matchs||[]).filter(m => m.eqA===eqA||m.eqB===eqA).forEach(m => {
        const w = m.scoreA>m.scoreB?m.eqA:m.scoreB>m.scoreA?m.eqB:null;
        if (w===eqA) { result.together.wA++; wMatch++; }
        else if (w===null) { result.together.dA++; dMatch++; }
        else { result.together.lA++; lMatch++; }
      });

      const wdl = wMatch > lMatch ? 'W' : lMatch > wMatch ? 'L' : 'D';
      togetherRaw.push({ date: s.date, equipe: eqA, gaA: gA+aA, gaB: gB+aB, wdl });
    }

    if (oppEq) {
      result.versus.sessions++;
      result.versus.gaA += gA + aA; result.versus.gA += gA; result.versus.aA += aA;
      result.versus.gaB += gB + aB; result.versus.gB += gB; result.versus.aB += aB;

      // W/D/L uniquement sur les matchs directs eqA vs eqB
      (s.matchs||[]).filter(m => (m.eqA===eqA&&m.eqB===eqB)||(m.eqA===eqB&&m.eqB===eqA)).forEach(m => {
        const w = m.scoreA>m.scoreB?m.eqA:m.scoreB>m.scoreA?m.eqB:null;
        if (w===eqA)      { result.versus.wA++; result.versus.lB++; }
        else if (w===eqB) { result.versus.wB++; result.versus.lA++; }
        else              { result.versus.dA++; result.versus.dB++; }
      });

      // Confrontations marquantes : un entry PAR MATCH direct eqA vs eqB
      (s.matchs||[]).forEach(m => {
        let scA, scB, swapped = false;
        if (m.eqA===eqA && m.eqB===eqB)      { scA=m.scoreA; scB=m.scoreB; }
        else if (m.eqA===eqB && m.eqB===eqA) { scA=m.scoreB; scB=m.scoreA; swapped=true; }
        else return;

        // G/A de pA et pB dans CE match uniquement
        let mgA=0, maA=0, mgB=0, maB=0;
        ["A","B"].forEach(side => {
          (m[`buteurs${side}`]||[]).forEach((b,i) => {
            if (!b||b==="CSC") return;
            const p=(m[`passeurs${side}`]||[])[i];
            if (b===pA) mgA++; if (p&&p!=="CSC"&&p===pA) maA++;
            if (b===pB) mgB++; if (p&&p!=="CSC"&&p===pB) maB++;
          });
        });

        versusRaw.push({ date: s.date, eqA, eqB, scoreA: scA, scoreB: scB, gA: mgA, aA: maA, gB: mgB, aB: maB });
      });
    }
  });

  result.matchsDirect = versusRaw.length;

  // Top 3 sessions ensemble (triées par gaA+gaB desc)
  result.together.best = togetherRaw
    .sort((a,b) => (b.gaA+b.gaB) - (a.gaA+a.gaB))
    .slice(0, 3);

  // Top 3 matchs directs (triés par G/A combinés desc, puis écart de score)
  result.versus.best = versusRaw
    .sort((a,b) => {
      const gaTotal = (b.gA+b.aA+b.gB+b.aB) - (a.gA+a.aA+a.gB+a.aB);
      if (gaTotal !== 0) return gaTotal;
      return Math.abs(b.scoreA-b.scoreB) - Math.abs(a.scoreA-a.scoreB);
    })
    .slice(0, 3);

  return result;
}

function renderRivBody(pA, pB, period) {
  if (pA === pB) {
    return `<p class="no-data">Sélectionne deux joueurs différents.</p>`;
  }
  const r = computeRivalites(pA, pB, period);
  if (r.total === 0) {
    return `<p class="no-data">Aucune session commune pour cette période.</p>`;
  }

  const wCol = "#34A853";
  const dCol = "var(--text3)";
  const lCol = "#ea4335";

  const hasTogether = r.together.sessions > 0;
  const hasVersus   = r.versus.sessions   > 0;

  // Header
  let h = `<div style="text-align:center;padding:10px 0 14px">
    <div style="font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:12px">
      <span>${pA}</span>
      <span style="font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.1em">VS</span>
      <span>${pB}</span>
    </div>
  </div>`;

  if (!hasTogether && !hasVersus) {
    h += `<p class="no-data">Aucune session avec équipes attribuées.</p>`;
    return h;
  }

  // Stats : récap | face à face | ensemble — 3 colonnes sur la même ligne
  h += `<div class="riv-grid">`;

  // Récap (1re carte) — 2×2
  const matchsTogether = r.together.wA + r.together.dA + r.together.lA;
  const matchsTotal = matchsTogether + r.matchsDirect;
  h += `<div class="riv-col-card" style="display:grid;grid-template-columns:1fr 1fr;gap:12px 4px;align-content:center;text-align:center;border-color:#FEDB00;border-width:1px">
    <div>
      <div style="font-size:26px;font-weight:800;font-style:italic;line-height:1;color:var(--text)">${r.total}</div>
      <div style="font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:3px">session${r.total>1?'s':''}</div>
    </div>
    <div>
      <div style="font-size:26px;font-weight:800;font-style:italic;line-height:1;color:var(--text)">${matchsTotal}</div>
      <div style="font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:3px">match${matchsTotal>1?'s':''}</div>
    </div>
    <div>
      <div style="font-size:26px;font-weight:800;font-style:italic;line-height:1;color:var(--text)">${matchsTogether}</div>
      <div style="font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:3px">ensemble</div>
    </div>
    <div>
      <div style="font-size:26px;font-weight:800;font-style:italic;line-height:1;color:var(--text)">${r.matchsDirect}</div>
      <div style="font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:3px">face à face</div>
    </div>
  </div>`;

  // Face à face (2e carte) — scoreboard pA vs pB
  if (hasVersus) {
    const v = r.versus;
    const colA = v.wA > v.wB ? wCol : v.wA < v.wB ? 'var(--text3)' : 'var(--text)';
    const colB = v.wB > v.wA ? wCol : v.wB < v.wA ? 'var(--text3)' : 'var(--text)';
    h += `<div class="riv-col-card" style="display:flex;flex-direction:column;justify-content:space-between">
      <div class="riv-col-title">⚔️ Face à face</div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:6px">
        <span style="font-size:12px;font-weight:700">${pA}</span>
        <span style="font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.12em;padding:0 6px;text-transform:uppercase">vs</span>
        <span style="font-size:12px;font-weight:700;text-align:right">${pB}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:baseline;margin-bottom:12px">
        <span style="font-size:40px;font-weight:800;font-style:italic;line-height:1;color:${colA}">${v.wA}</span>
        <span style="font-size:20px;font-weight:600;color:var(--text3);line-height:1;padding:0 8px">${v.dA}</span>
        <span style="font-size:40px;font-weight:800;font-style:italic;line-height:1;text-align:right;color:${colB}">${v.wB}</span>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:8px;display:flex;justify-content:space-between;font-size:11px;color:var(--text3)">
        <span><span style="font-weight:700;color:var(--text2)">${v.gA}</span> but${v.gA>1?'s':''} · <span style="font-weight:700;color:var(--text2)">${v.aA}</span> <span class="assist-full">assist${v.aA>1?'s':''}</span><span class="assist-short">ass.</span></span>
        <span><span style="font-weight:700;color:var(--text2)">${v.gB}</span> but${v.gB>1?'s':''} · <span style="font-weight:700;color:var(--text2)">${v.aB}</span> <span class="assist-full">assist${v.aB>1?'s':''}</span><span class="assist-short">ass.</span></span>
      </div>
    </div>`;
  } else {
    h += `<div class="riv-col-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div class="riv-col-title">⚔️ Face à face</div>
      <div class="riv-no-data-small">Pas de données</div>
    </div>`;
  }

  // Ensemble (3e carte) — pA × pB + V/N/D
  if (hasTogether) {
    const t = r.together;
    h += `<div class="riv-col-card" style="display:flex;flex-direction:column;justify-content:space-between">
      <div class="riv-col-title">🤝 Ensemble</div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:6px">
        <span style="font-size:12px;font-weight:700">${pA}</span>
        <span style="font-size:14px;color:var(--text3);font-weight:700;padding:0 6px">×</span>
        <span style="font-size:12px;font-weight:700;text-align:right">${pB}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;gap:2px;margin-bottom:3px">
        <span style="font-size:9px;color:${wCol};font-weight:700;text-transform:uppercase;letter-spacing:.06em">V</span>
        <span style="font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.06em">N</span>
        <span style="font-size:9px;color:${lCol};font-weight:700;text-transform:uppercase;letter-spacing:.06em">D</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;margin-bottom:12px">
        <span style="font-size:40px;font-weight:800;font-style:italic;line-height:1;color:${wCol}">${t.wA}</span>
        <span style="font-size:40px;font-weight:800;font-style:italic;line-height:1;color:var(--text3)">${t.dA}</span>
        <span style="font-size:40px;font-weight:800;font-style:italic;line-height:1;color:${lCol}">${t.lA}</span>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:8px;font-size:11px;color:var(--text3)">
        <span style="font-weight:700;color:var(--text)">${pA}</span> : <span style="font-weight:700;color:var(--text2)">${t.gA}</span> but${t.gA>1?'s':''} · <span style="font-weight:700;color:var(--text2)">${t.aA}</span> <span class="assist-full">assist${t.aA>1?'s':''}</span><span class="assist-short">ass.</span>
        <br>
        <span style="font-weight:700;color:var(--text)">${pB}</span> : <span style="font-weight:700;color:var(--text2)">${t.gB}</span> but${t.gB>1?'s':''} · <span style="font-weight:700;color:var(--text2)">${t.aB}</span> <span class="assist-full">assist${t.aB>1?'s':''}</span><span class="assist-short">ass.</span>
      </div>
    </div>`;
  } else {
    h += `<div class="riv-col-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div class="riv-col-title">🤝 Ensemble</div>
      <div class="riv-no-data-small">Pas de données</div>
    </div>`;
  }

  h += `</div>`;

  // Top soirées ensemble
  if (hasTogether && r.together.best.length > 0) {
    h += `<div class="riv-sessions-title">📅 Top soirées ensemble</div>`;
    r.together.best.forEach(sess => {
      const dateStr = new Date(sess.date).toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
      const resStr  = sess.wdl === 'W' ? `<span style="color:#34A853;font-weight:700">✓</span>`
                    : sess.wdl === 'L' ? `<span style="color:#ea4335;font-weight:700">✗</span>`
                    : `<span style="color:var(--text3)">=</span>`;
      h += `<div class="riv-sess-row">
        <span class="riv-sess-date">${dateStr}</span>
        ${badge(sess.equipe)}
        <span class="riv-sess-ga">${pA}: <strong>${sess.gaA}G/A</strong> · ${pB}: <strong>${sess.gaB}G/A</strong></span>
        ${resStr}
      </div>`;
    });
  }

  // Confrontations marquantes — 3 cartes par ligne
  if (hasVersus && r.versus.best.length > 0) {
    h += `<div class="riv-sessions-title">⚔️ Confrontations marquantes</div>`;
    h += `<div class="riv-match-grid">`;
    r.versus.best.forEach(m => {
      const dateStr = new Date(m.date).toLocaleDateString('fr-FR', {day:'numeric', month:'short', year:'numeric'});
      const gaStrA = `${m.gA}G · ${m.aA}A`;
      const gaStrB = `${m.gB}G · ${m.aB}A`;
      const hasGaA = m.gA + m.aA > 0;
      const hasGaB = m.gB + m.aB > 0;
      h += `<div class="riv-match-card">
        <div class="riv-match-date">${dateStr}</div>
        <div class="riv-match-score-row">
          ${badge(m.eqA)}
          <span class="riv-match-score">${m.scoreA} – ${m.scoreB}</span>
          ${badge(m.eqB)}
        </div>
        <div class="riv-match-players">
          <div class="riv-match-player">
            <div class="riv-match-player-name">${pA}</div>
            <div class="riv-match-player-ga${hasGaA?' active':''}">${gaStrA}</div>
          </div>
          <div class="riv-match-player">
            <div class="riv-match-player-name">${pB}</div>
            <div class="riv-match-player-ga${hasGaB?' active':''}">${gaStrB}</div>
          </div>
        </div>
      </div>`;
    });
    h += `</div>`;
  }

  return h;
}

      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--text2)">

        ${bt.topAssister ? `<span>🎯 ${pLink(bt.topAssister.name)} — ${bt.topAssister.count} assist${bt.topAssister.count>1?"s":""}</span>` : ""}

  const _rivPlayers = [..._rivRoster, ..._rivJokers];

    ..._rivRoster.map(p => `<option value="${p}">${p}</option>`),
    _rivJokers.length ? `<option disabled>──────────</option>` : '',

  </div>`;

  const isAdmin = sessionStorage.getItem("hmft_role") === "admin";
  if (isAdmin) {
    h += renderAchievementsClassement();
    h += renderAchievementsLegend();
  }

  container.innerHTML = h;
  animateView(container);

  /* ── Rivalités — init et listeners ── */
  const _rivSelA = container.querySelector('#riv-a');
  const _rivSelB = container.querySelector('#riv-b');
  const _rivSelP = container.querySelector('#riv-period');
  if (_rivSelA && _rivSelB && _rivSelP) {
    if (_rivDefault2) _rivSelB.value = _rivDefault2;
    const _updateRiv = () => {
      document.getElementById('riv-body').innerHTML = renderRivBody(_rivSelA.value, _rivSelB.value, _rivSelP.value);
    };
    _updateRiv();
    _rivSelA.addEventListener('change', _updateRiv);
    _rivSelB.addEventListener('change', _updateRiv);
    _rivSelP.addEventListener('change', _updateRiv);
  }

  if (isAdmin) {
    container.querySelector('#ach-cls-pills').addEventListener('click', e => {
      const pill = e.target.closest('.ach-cls-pill');
      if (!pill) return;
      container.querySelectorAll('.ach-cls-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      document.getElementById('ach-cls-body').innerHTML = renderAchClsBody(pill.dataset.acid);
    });

    const _list = container.querySelector('#ach-collect-list');
    if (_list) {
      const PER_PAGE = 5;
      const MEDALS = ['🥇','🥈','🥉'];
      let _page = 0;
      const _prevBtn = container.querySelector('#ach-collect-prev');
      const _nextBtn = container.querySelector('#ach-collect-next');
      const _infoEl  = container.querySelector('#ach-collect-info');
      const _sortNiv = container.querySelector('#ach-sort-niv');
      const _sortHF  = container.querySelector('#ach-sort-hf');

      const _updatePage = () => {
        const children = Array.from(_list.children);
        const pages = Math.ceil(children.length / PER_PAGE);
        children.forEach((r, i) => {
          r.style.display = (i >= _page * PER_PAGE && i < (_page + 1) * PER_PAGE) ? '' : 'none';
          r.querySelector('.ach-cls-rank').textContent = MEDALS[i] || `${i + 1}.`;
        });
        if (_prevBtn) _prevBtn.disabled = _page === 0;
        if (_nextBtn) _nextBtn.disabled = _page === pages - 1;
        if (_infoEl) _infoEl.textContent = `${_page + 1} / ${pages}`;
      };

      const _sortBy = key => {
        Array.from(_list.children)
          .sort((a, b) => (+b.dataset[key]) - (+a.dataset[key]) || a.querySelector('.ach-cls-name').textContent.localeCompare(b.querySelector('.ach-cls-name').textContent))
          .forEach(r => _list.appendChild(r));
        _page = 0;
        _updatePage();
      };

      if (_prevBtn) _prevBtn.addEventListener('click', () => { _page--; _updatePage(); });
      if (_nextBtn) _nextBtn.addEventListener('click', () => { _page++; _updatePage(); });
      if (_sortNiv) _sortNiv.addEventListener('click', () => {
        _sortNiv.classList.add('active'); _sortHF?.classList.remove('active');
        _sortBy('niv');
      });
      if (_sortHF) _sortHF.addEventListener('click', () => {
        _sortHF.classList.add('active'); _sortNiv?.classList.remove('active');
        _sortBy('hf');
      });

      _updatePage();
    }
  }
}

function renderDashboard() {
  const sessions = filterSessions(currentPeriod);
  const dash = document.getElementById("dash");

  const latestDate = SESSIONS.length
    ? fmtDate([...SESSIONS].sort((a,b)=>new Date(b.date)-new Date(a.date))[0].date)
    : "—";
  document.getElementById("header-sub").textContent = `Dernière session : ${latestDate}`;

  if (!sessions.length) {
    dash.innerHTML = '<p class="no-data" style="margin-top:2rem">Aucune session pour cette période.</p>';
    return;
  }

  if (currentPeriod === "last") {
    dash.innerHTML = renderSessionDetail(sessions[0]);
    animateView(dash);
    return;
  }

  const st = computeStats(sessions);
  let h = "";

  /* ── Palmarès Ballon d'Or par année (All-Time) — à implémenter quand on aura les données des années précédentes ── */

  /* ── Calculs agrégés ── */
  let draws = 0;
  const goalsAgainst = {Rouge:0, Vert:0, Bleue:0};
  st.allMatchs.forEach(m => {
    if (m.scoreA === m.scoreB) draws++;
    goalsAgainst[m.eqA] = (goalsAgainst[m.eqA]||0) + m.scoreB;
    goalsAgainst[m.eqB] = (goalsAgainst[m.eqB]||0) + m.scoreA;
  });
  const totalButs    = st.allMatchs.reduce((acc,m) => acc + m.scoreA + m.scoreB, 0);
  const teamsActive  = [...new Set(st.allMatchs.flatMap(m => [m.eqA, m.eqB]))];
  const maxGoalsPT   = teamsActive.length ? Math.max(...teamsActive.map(t => st.goalsPerTeam[t]||0)) : 0;
  const bestAtkTeams = teamsActive.filter(t => (st.goalsPerTeam[t]||0) === maxGoalsPT && maxGoalsPT > 0);
  const maxGoalsAg   = teamsActive.length ? Math.max(...teamsActive.map(t => goalsAgainst[t]||0)) : 0;
  const worstDefTeams = teamsActive.filter(t => (goalsAgainst[t]||0) === maxGoalsAg && maxGoalsAg > 0);
  const minGoalsAgAgg   = teamsActive.length ? Math.min(...teamsActive.map(t => goalsAgainst[t]||0)) : 0;
  const bestDefTeamsAgg = teamsActive.filter(t => (goalsAgainst[t]||0) === minGoalsAgAgg);
  const maxWinsAgg   = Math.max(0, ...Object.values(st.colorWins));
  const winnerTeamsAgg = Object.entries(st.colorWins).filter(([,v]) => v === maxWinsAgg && maxWinsAgg > 0).map(([k]) => k);
  const atkGoals     = maxGoalsPT;
  const defGoals     = maxGoalsAg;
  const medals       = ["🥇","🥈","🥉"];
  const _fmtBut      = arr => {
    if (!arr || !arr.length) return "";
    const c = {}; arr.forEach(p => { c[p]=(c[p]||0)+1; });
    return Object.entries(c).sort((a,b)=>a[0].localeCompare(b[0],"fr")).map(([p,n]) => {
      const d = p==="CSC" ? p : `<button class="player-link" data-player="${p}" style="font-size:inherit">${p}</button>`;
      return n>1 ? `${d} ×${n}` : d;
    }).join(", ");
  };

  /* ── Section 1 : 8 cartes match (2 × 4) ── */
  const victSubAgg = ["Rouge","Vert","Bleue"].filter(c => st.colorWins[c] > 0)
    .map(c => `${dot(c)}${st.colorWins[c]}`).join(" · ");
  const matchSubAgg = [victSubAgg, draws > 0 ? `<span class="cdot gris"></span>${draws} ${draws>1?"":""}` : ""].filter(Boolean).join(" · ");

  const top3Html      = buildAggTop3(st.buteursRank.map(([n,p])=>[n,p.buts]),   "but",   "buts");
  const top3PassHtml  = buildAggTop3(st.passeursRank.map(([n,p])=>[n,p.passes]),"passe","passes");

  /* KPI cards agrégées — pré-calcul */
  const avgButsAgg       = st.allMatchs.length > 0 ? (totalButs / st.allMatchs.length).toFixed(1) : "—";
  const bestTeamsHtmlAgg = winnerTeamsAgg.length===0?"—":winnerTeamsAgg.slice(0,2).map(t=>teamTagColored(t)).join(" &middot; ");
  const atkTeamHtmlAgg   = bestAtkTeams.length===0?"—":bestAtkTeams.slice(0,2).map(t=>teamTagColored(t)).join(" &middot; ");
  const defTeamHtmlAgg   = worstDefTeams.length===0?"—":worstDefTeams.slice(0,2).map(t=>teamTagColored(t)).join(" &middot; ");
  const bestAccentAgg    = kpiTeamCard(winnerTeamsAgg);
  const atkAccentAgg     = kpiTeamCard(bestAtkTeams);
  const defAccentAgg     = kpiTeamCard(worstDefTeams);
  const grosAccAgg       = st.mostGoals  ? matchAccent(st.mostGoals)  : "";
  const largeAccAgg      = st.biggestAmp ? matchAccent(st.biggestAmp) : "";
  const grosColAgg       = scoreColors(st.mostGoals);
  const largeColAgg      = scoreColors(st.biggestAmp);
  const grosBodyAgg = st.mostGoals ? `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
      <div style="flex:1;text-align:left">
        <div style="font-size:36px;font-weight:700;font-style:italic;line-height:1;color:${grosColAgg.a}">${st.mostGoals.scoreA}</div>
        <div style="margin-top:5px">${badge(st.mostGoals.eqA)}</div>
      </div>

function populateSessionSelect() {
  const sel = document.getElementById("session-date");
  sel.innerHTML = "";
  if (!SESSIONS.length) {
    sel.innerHTML = `<option value="">Aucune session disponible</option>`;
    return;
  }
  const sorted = [...SESSIONS].sort((a,b) => new Date(b.date)-new Date(a.date));
  sorted.forEach((s, i) => {
    const opt = document.createElement("option");
    opt.value = s.date;
    opt.textContent = fmtDate(s.date);
    if (i === 0) opt.selected = true;
    sel.appendChild(opt);
  });
}


function renderSessionResults(date) {
  const container = document.getElementById("session-results");
  const session = SESSIONS.find(s => s.date === date);
  if (!session) {
    container.innerHTML = `<p class="no-data" style="margin-top:1rem">Aucune donnée pour cette session.</p>`;
    return;
  }
  container.innerHTML = renderSessionDetail(session);
  animateView(container);
}

let rosterSort = { col: "taux",      dir: 1 };
let jokerSort  = { col: "presences", dir: 1 };

function computePlayerStats() {
  const ps = {};
  ALL_PLAYERS.forEach(p => {
    ps[p] = { presences:0, absences:0, blesses:0, pasRepondu:0, buts:0, passes:0, vR:0, vV:0, vB:0, sac:0, maillots:0 };
  });

  SESSIONS.forEach(s => {
    Object.entries(s.presences).forEach(([p, info]) => {
      if (!ps[p]) ps[p] = { presences:0, absences:0, blesses:0, pasRepondu:0, buts:0, passes:0, vR:0, vV:0, vB:0, sac:0, maillots:0 };
      if      (info.statut === "Présent")     ps[p].presences++;
      else if (info.statut === "Absent")      ps[p].absences++;
      else if (info.statut === "Blessé")      ps[p].blesses++;
      else if (info.statut === "Pas répondu") ps[p].pasRepondu++;
    });
    if (s.sac     && ps[s.sac])     ps[s.sac].sac++;
    if (s.maillots && ps[s.maillots]) ps[s.maillots].maillots++;
    if (s.matchs) {
      s.matchs.forEach(m => {
        ["A","B"].forEach(side => {
          const buts = m[`buteurs${side}`]||[], passes = m[`passeurs${side}`]||[];
          buts.forEach((b,i) => {
            if (!b || b==="CSC") return;
            if (ps[b]) ps[b].buts++;
            const p = passes[i]; if (p && p!=="CSC" && ps[p]) ps[p].passes++;
          });
        });
        const winner = m.scoreA > m.scoreB ? m.eqA : m.scoreB > m.scoreA ? m.eqB : null;
        if (winner) {
          Object.entries(s.presences).forEach(([p, info]) => {
            if (info.statut === "Présent" && info.equipe === winner && ps[p]) {
              if (winner==="Rouge") ps[p].vR++; else if (winner==="Vert") ps[p].vV++; else ps[p].vB++;
            }
          });
        }
      });
    }
  });

  return Object.entries(ps).map(([name, d]) => {
    const best = Math.max(d.vR, d.vV, d.vB);
    const favTeam = best === 0 ? null : d.vR === best ? "Rouge" : d.vV === best ? "Vert" : "Bleue";
    return { name, ...d, favTeam };
  });
}


function renderJoueurs() {
  const container = document.getElementById("joueurs-content");
  const rows = computePlayerStats();
  const totalSessions = SESSIONS.length;
  const isAdmin = sessionStorage.getItem("hmft_role") === "admin";

  const colDef = [
    { key:"name",       label:"Joueur"         },
    { key:"taux",       label:"%"              },
    { key:"buts",       label:"Buts"           },
    { key:"passes",     label:"Assists"        },
    { key:"absences",   label:"❌"             },
    { key:"blesses",    label:"🤕"             },
    { key:"pasRepondu", label:"⁉️"             },
    { key:"sac",        label:"🎒"             },
    { key:"maillots",   label:"👕"             },
    { key:"favTeam",    label:"Éq."            },
  ];
  const jokerColDef = [
    { key:"name",       label:"Joueur"         },
    { key:"presences",  label:"✅"             },
    { key:"buts",       label:"Buts"           },
    { key:"passes",     label:"Assists"        },
    { key:"absences",   label:"❌"             },
    { key:"blesses",    label:"🤕"             },
    { key:"pasRepondu", label:"⁉️"             },
    { key:"sac",        label:"🎒"             },
    { key:"maillots",   label:"👕"             },
    { key:"favTeam",    label:"Éq."            },
  ];

  const rowsWithTaux = rows.map(r => ({
    ...r,
    taux: totalSessions > 0 ? Math.round(r.presences / totalSessions * 100) : 0
  }));

  const rosterRows = rowsWithTaux.filter(r => !JOKERS.has(r.name));
  const jokerRows  = rowsWithTaux.filter(r =>  JOKERS.has(r.name));

  function sortArr(arr, s) {
    return [...arr].sort((a, b) => {
      const av = a[s.col] ?? ""; const bv = b[s.col] ?? "";
      if (typeof av === "number" && typeof bv === "number") {
        const diff = (bv - av) * s.dir;
        return diff !== 0 ? diff : a.name.localeCompare(b.name, "fr");
      }
      const diff = String(av).localeCompare(String(bv), "fr") * s.dir;
      return diff !== 0 ? diff : a.name.localeCompare(b.name, "fr");
    });
  }

  const dash_ = `<span style="color:var(--text3);font-size:13px">—</span>`;

  function buildThead(s, cols) {
    const base = (cols || colDef).map(c => {
      const active = s.col === c.key ? " sorted" : "";
      const arrow  = s.col === c.key ? (s.dir === 1 ? "↑" : "↓") : "↕";
      return `<th data-col="${c.key}" class="${active}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
    }).join("");
    return base;
  }

  function buildRosterRow(r) {
    const teamCell = r.favTeam ? `${dot(r.favTeam)}<span style="font-size:12px">${(TEAM_LABEL[r.favTeam]||r.favTeam)[0].toUpperCase()}</span>` : dash_;
    const tauxCls  = r.taux >= 75 ? "high" : r.taux >= 40 ? "mid" : "low";
    const tauxCell = `<div class="taux-wrap"><div class="taux-track"><div class="taux-fill ${tauxCls}" style="width:${r.taux}%"></div></div><span class="taux-val ${tauxCls}">${r.taux}%</span></div>`;
    return `<tr>
      <td class="name"><button class="player-link" data-player="${r.name}">${r.name}</button></td>
      <td class="taux-cell">${tauxCell}</td>
      <td class="num ${r.buts > 0 ? "highlight" : "zero"}">${r.buts}</td>
      <td class="num ${r.passes > 0 ? "highlight" : "zero"}">${r.passes}</td>
      <td class="num ${r.absences > 0 ? "danger" : "zero"}">${r.absences}</td>
      <td class="num ${r.blesses > 0 ? "warn" : "zero"}">${r.blesses}</td>
      <td class="num ${r.pasRepondu > 0 ? "nr" : "zero"}">${r.pasRepondu}</td>
      <td class="num ${r.sac > 0 ? "highlight" : "zero"}">${r.sac}</td>
      <td class="num ${r.maillots > 0 ? "highlight" : "zero"}">${r.maillots}</td>
      <td class="team-cell">${teamCell}</td>
    </tr>`;
  }

  function buildJokerRow(r) {
    const teamCell = r.favTeam ? `${dot(r.favTeam)}<span style="font-size:12px">${(TEAM_LABEL[r.favTeam]||r.favTeam)[0].toUpperCase()}</span>` : dash_;
    return `<tr>
      <td class="name"><button class="player-link" data-player="${r.name}">${r.name}<span class="joker-tag">+1</span></button></td>
      <td class="num ${r.presences > 0 ? "highlight" : "zero"}">${r.presences}</td>
      <td class="num ${r.buts > 0 ? "highlight" : "zero"}">${r.buts}</td>
      <td class="num ${r.passes > 0 ? "highlight" : "zero"}">${r.passes}</td>
      <td class="num zero">${dash_}</td>
      <td class="num zero">${dash_}</td>
      <td class="num zero">${dash_}</td>
      <td class="num zero">${dash_}</td>
      <td class="num zero">${dash_}</td>
      <td class="team-cell">${teamCell}</td>
    </tr>`;
  }

  const rosterThead = buildThead(rosterSort);
  const rosterTbody = sortArr(rosterRows, rosterSort).map(buildRosterRow).join("");
  const jokerThead  = buildThead(jokerSort, jokerColDef);
  const jokerTbody  = sortArr(jokerRows,  jokerSort).map(buildJokerRow).join("");

  const jokerSection = jokerRows.length > 0 ? `
    <div class="joueurs-section-label" style="margin-top:2rem">Joueurs +1 (${jokerRows.length})</div>
    <div class="table-with-toggle">
      <div class="players-table-wrap">
        <table class="players-table" id="jokers-table">
          <thead><tr>${jokerThead}</tr></thead>
          <tbody>${jokerTbody}</tbody>
        </table>
      </div>
      ${isAdmin ? '<div class="toggle-btns-col" id="toggle-col-jokers"></div>' : ''}
    </div>` : "";

  container.innerHTML = `
    <div class="joueurs-section-label">Roster (${rosterRows.length})</div>
    <div class="table-with-toggle">
      <div class="players-table-wrap">
        <table class="players-table" id="roster-table">
          <thead><tr>${rosterThead}</tr></thead>
          <tbody>${rosterTbody}</tbody>
        </table>
      </div>
      ${isAdmin ? '<div class="toggle-btns-col" id="toggle-col-roster"></div>' : ''}
    </div>${jokerSection}`;
  animateTable();

  if (isAdmin) {
    [['roster-table','toggle-col-roster',true],['jokers-table','toggle-col-jokers',false]].forEach(([tblId,colId,isRoster]) => {
      const tbl = document.getElementById(tblId);
      const col = document.getElementById(colId);
      if (!tbl || !col) return;
      const theadH = tbl.querySelector('thead').offsetHeight;
      const rows   = tbl.querySelectorAll('tbody tr');
      let h = `<div style="height:${theadH}px"></div>`;
      rows.forEach(tr => {
        const player = tr.querySelector('[data-player]')?.dataset.player || '';
        const rowH   = tr.offsetHeight;
        h += `<div style="height:${rowH}px;display:flex;align-items:center;padding:0 10px">
          <button data-action="toggle-roster" data-player="${player}" title="${isRoster?'Passer en +1':'Passer en roster'}">${isRoster?'🔽':'🔼'}</button>
        </div>`;
      });
      col.innerHTML = h;
    });
  }

  document.getElementById("roster-table")?.querySelectorAll("th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (rosterSort.col === col) { rosterSort.dir *= -1; }
      else { rosterSort.col = col; rosterSort.dir = col === "name" ? 1 : -1; }
      renderJoueurs();
    });
  });

  document.getElementById("jokers-table")?.querySelectorAll("th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (jokerSort.col === col) { jokerSort.dir *= -1; }
      else { jokerSort.col = col; jokerSort.dir = col === "name" ? 1 : -1; }
      renderJoueurs();
    });
  });
}

function computePlayerDetailStats(playerName) {
  const sessionsByDate = [...SESSIONS].sort((a,b) => new Date(a.date)-new Date(b.date));
  let presences = 0, absences = 0, blesses = 0, buts = 0, episodesBlessures = 0, pasRepondu = 0, inEpisode = false;
  let matchsJoues = 0, victoires = 0, defaites = 0, sac = 0, maillots = 0, passesDecisives = 0;
  const teamCount = {}, winsByColor = {}, teammateCount = {}, winTeammateCount = {};
  let bestMatch = null, bestMatchGoals = 0, bestMatchAssists = 0, bestMatchGA = 0;

  sessionsByDate.forEach(s => {
    const info = s.presences[playerName];
    if (!info) { inEpisode = false; return; }
    if (info.statut === "Présent") {
      presences++; inEpisode = false;
      if (s.sac === playerName) sac++;
      if (s.maillots === playerName) maillots++;
      const myEquipe = info.equipe || null;
      if (myEquipe) {
        teamCount[myEquipe] = (teamCount[myEquipe] || 0) + 1;
        Object.entries(s.presences).forEach(([other, oi]) => {
          if (other === playerName || oi.statut !== "Présent" || oi.equipe !== myEquipe) return;
          teammateCount[other] = (teammateCount[other] || 0) + 1;
        });
      }
      (s.matchs || []).forEach(m => {
        let g = 0, a = 0;
        ["A","B"].forEach(side => {
          const buts = m[`buteurs${side}`]||[], passes = m[`passeurs${side}`]||[];
          buts.forEach((b,i) => {
            if (!b || b==="CSC") return;
            if (b === playerName) g++;
            const p = passes[i]; if (p && p!=="CSC" && p === playerName) a++;
          });
        });
        buts += g;
        passesDecisives += a;
        const ga = g + a;
        if (ga > bestMatchGA) { bestMatchGA = ga; bestMatchGoals = g; bestMatchAssists = a; bestMatch = {...m, date: s.date}; }
        if (!myEquipe || (m.eqA !== myEquipe && m.eqB !== myEquipe)) return;
        matchsJoues++;
        const winner = m.scoreA > m.scoreB ? m.eqA : m.scoreB > m.scoreA ? m.eqB : null;
        if (winner === myEquipe) {
          victoires++;
          winsByColor[myEquipe] = (winsByColor[myEquipe] || 0) + 1;
          Object.entries(s.presences).forEach(([other, oi]) => {
            if (other === playerName || oi.statut !== "Présent" || oi.equipe !== myEquipe) return;
            winTeammateCount[other] = (winTeammateCount[other] || 0) + 1;
          });
        } else if (winner !== null) {
          defaites++;
        }
      });
    } else if (info.statut === "Absent") {
      absences++; inEpisode = false;
    } else if (info.statut === "Blessé") {
      blesses++;
      if (!inEpisode) { episodesBlessures++; inEpisode = true; }
    } else if (info.statut === "Pas répondu") {
      pasRepondu++; inEpisode = false;
    } else {
      inEpisode = false;
    }
  });

  const top3T  = Object.entries(teammateCount).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const top3WT = Object.entries(winTeammateCount).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const maxTeam = Math.max(0, ...Object.values(teamCount));
  const recurringColor = maxTeam > 0 ? Object.entries(teamCount).sort((a,b)=>b[1]-a[1])[0][0] : null;
  const maxWins = Math.max(0, ...Object.values(winsByColor));
  const prefWinColor = maxWins > 0 ? Object.entries(winsByColor).sort((a,b)=>b[1]-a[1])[0][0] : null;

  /* Meilleure série G/A — par MATCH joué (présent + équipe jouait).
     Seul un match joué à 0 G/A coupe la série ; les absences ne la cassent pas. */
  const participatedMatches = [];
  sessionsByDate.forEach(s => {
    const info = s.presences[playerName];
    if (!info || info.statut !== "Présent") return;
    const myEquipe = info.equipe;
    if (!myEquipe) return;
    (s.matchs || []).forEach(m => {
      if (m.eqA !== myEquipe && m.eqB !== myEquipe) return;
      let g = 0, a = 0;
      ["A","B"].forEach(side => {
        const buts = m[`buteurs${side}`]||[], passes = m[`passeurs${side}`]||[];
        buts.forEach((b,i) => {
          if (!b || b==="CSC") return;
          if (b === playerName) g++;
          const p = passes[i]; if (p && p!=="CSC" && p === playerName) a++;
        });
      });
      participatedMatches.push({ date: s.date, g, a });
    });
  });

  let bestHistoricalStreak = null;
  let currentStreak       = null;
  let _scur = null;

  const _finalizeStreak = (active) => {
    if (!_scur) return;
    const s = { start: _scur.start, end: _scur.end, count: _scur.count, g: _scur.g, a: _scur.a };
    _scur = null;
    if (active) {
      currentStreak = s;
    } else if (!bestHistoricalStreak || s.count > bestHistoricalStreak.count ||
               (s.count === bestHistoricalStreak.count && (s.g+s.a) > (bestHistoricalStreak.g+bestHistoricalStreak.a))) {
      bestHistoricalStreak = s;
    }
  };

  for (const pm of participatedMatches) {
    if (pm.g + pm.a > 0) {
      if (!_scur) _scur = { start: pm.date, end: pm.date, count: 0, g: 0, a: 0 };
      _scur.end = pm.date;
      _scur.count++;
      _scur.g += pm.g;
      _scur.a += pm.a;
    } else {
      _finalizeStreak(false);
    }
  }
  _finalizeStreak(true);

  return { presences, absences, blesses, episodesBlessures, pasRepondu, buts, passesDecisives,
           matchsJoues, victoires, defaites, sac, maillots,
           bestMatch, bestMatchGoals, bestMatchAssists, recurringColor, teamCount,
           top3Teammates: top3T, top3WinTeammates: top3WT, prefWinColor, maxWins,
           bestHistoricalStreak, currentStreak };
}
